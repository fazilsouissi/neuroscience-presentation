.6\"><\u002Fcircle>\n              <circle class=\"m4ion\" cx=\"625\" cy=\"90\" r=\"5\" fill=\"#d44a3a\" stroke=\"#7a2515\" stroke-width=\"0.6\"><\u002Fcircle>\n              <circle class=\"m4ion\" cx=\"655\" cy=\"80\" r=\"5\" fill=\"#d44a3a\" stroke=\"#7a2515\" stroke-width=\"0.6\"><\u002Fcircle>\n              <circle class=\"m4ion\" cx=\"680\" cy=\"65\" r=\"5\" fill=\"#d44a3a\" stroke=\"#7a2515\" stroke-width=\"0.6\"><\u002Fcircle>\n              <circle class=\"m4ion\" cx=\"685\" cy=\"100\" r=\"5\" fill=\"#d44a3a\" stroke=\"#7a2515\" stroke-width=\"0.6\"><\u002Fcircle>\n            <\u002Fg>\n            <!-- ion flowing through channel -->\n            <circle id=\"m4-ion-flow\" cx=\"630\" cy=\"160\" r=\"5\" fill=\"#d44a3a\" stroke=\"#7a2515\" stroke-width=\"0.6\" opacity=\"0\"><\u002Fcircle>\n\n            <!-- \"Receptor\" label -->\n            <g id=\"m4-rec-label\" opacity=\"0\">\n              <text x=\"305\" y=\"125\" font-size=\"11\" font-style=\"italic\" fill=\"#1c2620\">Receptor<\u002Ftext>\n              <line x1=\"304\" y1=\"128\" x2=\"278\" y2=\"135\" stroke=\"#3a4640\" stroke-width=\"0.8\"><\u002Fline>\n            <\u002Fg>\n            <text x=\"105\" y=\"280\" font-size=\"11\" font-style=\"italic\" fill=\"#1c2620\" id=\"m4-gp-label\" opacity=\"0\">G-protein<\u002Ftext>\n\n            <!-- ===== Numbered callouts ===== -->\n            <g font-family=\"Inter, sans-serif\">\n              <!-- 1 NT binds -->\n              <g id=\"m4-cb1\" opacity=\"0\">\n                <rect x=\"200\" y=\"35\" width=\"120\" height=\"38\" rx=\"4\" fill=\"#fff\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Frect>\n                <circle cx=\"212\" cy=\"54\" r=\"8\" fill=\"#1c2620\"><\u002Fcircle>\n                <text x=\"212\" y=\"59\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"700\">1<\u002Ftext>\n                <text x=\"226\" y=\"51\" font-size=\"11\" fill=\"#1c2620\">Neurotransmitter<\u002Ftext>\n                <text x=\"226\" y=\"65\" font-size=\"11\" fill=\"#1c2620\">binds.<\u002Ftext>\n                <line x1=\"222\" y1=\"73\" x2=\"200\" y2=\"115\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Fline>\n              <\u002Fg>\n              <!-- 2 G-protein activated -->\n              <g id=\"m4-cb2\" opacity=\"0\">\n                <rect x=\"120\" y=\"345\" width=\"135\" height=\"38\" rx=\"4\" fill=\"#fff\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Frect>\n                <circle cx=\"132\" cy=\"364\" r=\"8\" fill=\"#1c2620\"><\u002Fcircle>\n                <text x=\"132\" y=\"369\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"700\">2<\u002Ftext>\n                <text x=\"146\" y=\"361\" font-size=\"11\" fill=\"#1c2620\">G-protein is<\u002Ftext>\n                <text x=\"146\" y=\"375\" font-size=\"11\" fill=\"#1c2620\">activated.<\u002Ftext>\n                <line x1=\"222\" y1=\"345\" x2=\"220\" y2=\"298\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Fline>\n              <\u002Fg>\n              <!-- 3 Modulate -->\n              <g id=\"m4-cb3\" opacity=\"0\">\n                <rect x=\"290\" y=\"355\" width=\"200\" height=\"50\" rx=\"4\" fill=\"#fff\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Frect>\n                <circle cx=\"302\" cy=\"374\" r=\"8\" fill=\"#1c2620\"><\u002Fcircle>\n                <text x=\"302\" y=\"379\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"700\">3<\u002Ftext>\n                <text x=\"316\" y=\"371\" font-size=\"11\" fill=\"#1c2620\">G-protein subunits or<\u002Ftext>\n                <text x=\"316\" y=\"385\" font-size=\"11\" fill=\"#1c2620\">intracellular messengers<\u002Ftext>\n                <text x=\"316\" y=\"399\" font-size=\"11\" fill=\"#1c2620\">modulate ion channels.<\u002Ftext>\n                <line x1=\"488\" y1=\"370\" x2=\"555\" y2=\"280\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Fline>\n              <\u002Fg>\n              <!-- 4 Channel opens -->\n              <g id=\"m4-cb4\" opacity=\"0\">\n                <rect x=\"630\" y=\"370\" width=\"115\" height=\"38\" rx=\"4\" fill=\"#fff\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Frect>\n                <circle cx=\"642\" cy=\"389\" r=\"8\" fill=\"#1c2620\"><\u002Fcircle>\n                <text x=\"642\" y=\"394\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"700\">4<\u002Ftext>\n                <text x=\"656\" y=\"386\" font-size=\"11\" fill=\"#1c2620\">Ion channel<\u002Ftext>\n                <text x=\"656\" y=\"400\" font-size=\"11\" fill=\"#1c2620\">opens.<\u002Ftext>\n                <line x1=\"630\" y1=\"380\" x2=\"608\" y2=\"245\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Fline>\n              <\u002Fg>\n              <!-- 5 Ions flow -->\n              <g id=\"m4-cb5\" opacity=\"0\">\n                <rect x=\"640\" y=\"155\" width=\"115\" height=\"50\" rx=\"4\" fill=\"#fff\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Frect>\n                <circle cx=\"652\" cy=\"174\" r=\"8\" fill=\"#1c2620\"><\u002Fcircle>\n                <text x=\"652\" y=\"179\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"700\">5<\u002Ftext>\n                <text x=\"666\" y=\"171\" font-size=\"11\" fill=\"#1c2620\">Ions flow<\u002Ftext>\n                <text x=\"666\" y=\"185\" font-size=\"11\" fill=\"#1c2620\">across<\u002Ftext>\n                <text x=\"666\" y=\"199\" font-size=\"11\" fill=\"#1c2620\">membrane.<\u002Ftext>\n                <line x1=\"640\" y1=\"180\" x2=\"612\" y2=\"170\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Fline>\n              <\u002Fg>\n            <\u002Fg>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"right\">\n          <div class=\"equation\" id=\"s4-eq\">\n            <span class=\"word\">Receptor<\u002Fspan><span class=\"word arrow\">→<\u002Fspan>\n            <span class=\"word\">G-protein<\u002Fspan><span class=\"word arrow\">→<\u002Fspan>\n            <span class=\"word\">Effector<\u002Fspan><span class=\"word arrow\">→<\u002Fspan>\n            <span class=\"word\">Second<\u002Fspan><span class=\"word\">messenger<\u002Fspan><span class=\"word arrow\">→<\u002Fspan>\n            <span class=\"word\">Response<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"delegation\" id=\"s4-deleg\">\n            <div class=\"lbl\">Key concept<\u002Fdiv>\n            <div class=\"word\">DELEGATION<\u002Fdiv>\n            <div class=\"desc\">The receptor doesn't act — it hands off responsibility, step by step.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"notes\">\n        <button class=\"notes-toggle\" data-notes-toggle=\"\">Hide notes<\u002Fbutton>\n        <div class=\"label\">Speaker notes<\u002Fdiv>\n        <div class=\"body\">When a neurotransmitter binds a metabotropic receptor, the receptor undergoes a conformational change on its intracellular side. This allows it to interact with a G-protein sitting at the inner face of the membrane. The G-protein then activates a downstream effector, typically an enzyme, which produces second messengers. Those second messengers propagate the signal further, changing the activity of ion channels, protein kinases, and other effector proteins inside the cell. The key concept on this slide is delegation. The receptor does not directly create the response — it hands off responsibility to the G-protein, which hands off to an enzyme, which produces second messengers, which finally act on the cell. G-proteins are the coupling step. They are the bridge between the receptor at the membrane and the response happening inside.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SLIDE 5 -->\n    <section class=\"slide s5\" data-slide=\"5\">\n      <div class=\"eyebrow\">05 · The molecular cycle<\u002Fdiv>\n      <h2>The G-protein cycle<\u002Fh2>\n      <div class=\"layout\">\n        <div class=\"cycle-card\">\n          <svg id=\"cycle-svg\" viewBox=\"0 0 600 460\" width=\"100%\" height=\"100%\">\n            <!-- outer ring -->\n            <circle cx=\"300\" cy=\"230\" r=\"170\" fill=\"none\" stroke=\"#d8d6cc\" stroke-width=\"1.5\" stroke-dasharray=\"4 6\"><\u002Fcircle>\n            <!-- 4 phase dots -->\n            <g font-size=\"10\" fill=\"#5d6b62\" letter-spacing=\"1.5\">\n              <text x=\"300\" y=\"50\" text-anchor=\"middle\">1 · RESTING (OFF)<\u002Ftext>\n              <text x=\"490\" y=\"234\" text-anchor=\"middle\">2 · ACTIVATION (ON)<\u002Ftext>\n              <text x=\"300\" y=\"425\" text-anchor=\"middle\">3 · DISSOCIATION<\u002Ftext>\n              <text x=\"110\" y=\"234\" text-anchor=\"middle\">4 · HYDROLYSIS · RESET<\u002Ftext>\n            <\u002Fg>\n            <!-- center cluster: trimer that morphs -->\n            <g id=\"trimer\">\n              <!-- alpha -->\n              <g id=\"c-alpha\">\n                <circle cx=\"300\" cy=\"230\" r=\"32\" fill=\"#caa24a\" stroke=\"#2d5a3d\" stroke-width=\"1.5\"><\u002Fcircle>\n                <text x=\"300\" y=\"236\" text-anchor=\"middle\" font-size=\"16\" fill=\"#1c2620\" font-weight=\"700\">α<\u002Ftext>\n              <\u002Fg>\n              <!-- beta -->\n              <g id=\"c-beta\">\n                <circle cx=\"346\" cy=\"246\" r=\"22\" fill=\"#a3b5a8\" stroke=\"#2d5a3d\" stroke-width=\"1.5\"><\u002Fcircle>\n                <text x=\"346\" y=\"251\" text-anchor=\"middle\" font-size=\"12\" fill=\"#1c2620\" font-weight=\"700\">β<\u002Ftext>\n              <\u002Fg>\n              <!-- gamma -->\n              <g id=\"c-gamma\">\n                <circle cx=\"370\" cy=\"226\" r=\"16\" fill=\"#c4cfc7\" stroke=\"#2d5a3d\" stroke-width=\"1.5\"><\u002Fcircle>\n                <text x=\"370\" y=\"230\" text-anchor=\"middle\" font-size=\"10\" fill=\"#1c2620\" font-weight=\"700\">γ<\u002Ftext>\n              <\u002Fg>\n              <!-- nucleotide -->\n              <g id=\"c-nuc\">\n                <rect id=\"c-nuc-box\" x=\"278\" y=\"218\" width=\"44\" height=\"22\" rx=\"3\" fill=\"#fff\" stroke=\"#2d5a3d\" stroke-width=\"1.2\"><\u002Frect>\n                <text id=\"c-nuc-text\" x=\"300\" y=\"234\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#5d6b62\">GDP<\u002Ftext>\n              <\u002Fg>\n            <\u002Fg>\n            <!-- arrows around the ring -->\n            <g fill=\"none\" stroke=\"#3d7a52\" stroke-width=\"1.5\" marker-end=\"url(#cyc-arrow)\">\n              <path d=\"M 380 90 Q 460 130 470 200\"><\u002Fpath>\n              <path d=\"M 470 270 Q 460 340 380 380\"><\u002Fpath>\n              <path d=\"M 220 380 Q 140 340 130 270\"><\u002Fpath>\n              <path d=\"M 130 200 Q 140 130 220 90\"><\u002Fpath>\n            <\u002Fg>\n            <defs>\n              <marker id=\"cyc-arrow\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\">\n                <path d=\"M0 0 L10 5 L0 10 Z\" fill=\"#3d7a52\"><\u002Fpath>\n              <\u002Fmarker>\n            <\u002Fdefs>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"state-list\">\n          <div class=\"state\" data-state=\"1\">\n            <div class=\"tag off\">GDP · Off<\u002Fdiv>\n            <div class=\"desc\">Resting trimer. Alpha holds GDP.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"state\" data-state=\"2\">\n            <div class=\"tag on\">GTP · On<\u002Fdiv>\n            <div class=\"desc\">Receptor triggers GDP–GTP exchange.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"state\" data-state=\"3\">\n            <div class=\"tag off\">Hydrolysis · Off again<\u002Fdiv>\n            <div class=\"desc\">α reassembles with βγ. Reset.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"insight\" id=\"s5-insight\" style=\"margin:0\">A controlled timer — not a permanent switch.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"notes\">\n        <button class=\"notes-toggle\" data-notes-toggle=\"\">Hide notes<\u002Fbutton>\n        <div class=\"label\">Speaker notes<\u002Fdiv>\n        <div class=\"body\">Heterotrimeric G-proteins have three subunits: alpha, beta, and gamma. In the resting state, GDP is bound to the alpha subunit — GDP means off. When the receptor is activated, it triggers the exchange of GDP for GTP on the alpha subunit. GTP means on. Once active, the alpha-GTP subunit dissociates from the beta-gamma complex, and both go on to regulate downstream effectors. But the signal doesn't stay on forever. The alpha subunit hydrolyzes GTP back to GDP on its own — off again. The system resets. The G-protein is a controlled timer: it turns on briefly, acts, and turns itself off. A signal that can't switch off is a signal that can't be regulated.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SLIDE 6 -->\n    <section class=\"slide s6\" data-slide=\"6\">\n      <div class=\"eyebrow\">06 · Three pathways<\u002Fdiv>\n      <h2>Three main G-protein pathways<\u002Fh2>\n      <div class=\"columns\">\n        <!-- Gs -->\n        <div class=\"pcol gs\" data-col=\"gs\">\n          <div class=\"header\"><span class=\"dot\"><\u002Fspan><span class=\"name\" style=\"color:var(--accent-blue)\">Gs pathway<\u002Fspan><\u002Fdiv>\n          <div class=\"step\"><span class=\"k\">Signal<\u002Fspan><span class=\"v\">Norepinephrine<\u002Fspan><\u002Fdiv>\n          <div class=\"arrow\">↓<\u002Fdiv>\n          <div class=\"step\"><span class=\"k\">Receptor<\u002Fspan><span class=\"v\">β-adrenergic<\u002Fspan><\u002Fdiv>\n          <div class=\"arrow\">↓<\u002Fdiv>\n          <div class=\"step\"><span class=\"k\">G-protein<\u002Fspan><span class=\"v\">Gs<\u002Fspan><\u002Fdiv>\n          <div class=\"arrow\">↓<\u002Fdiv>\n          <div class=\"step\"><span class=\"k\">Effector<\u002Fspan><span class=\"v\">Adenylyl cyclase<\u002Fspan><\u002Fdiv>\n          <div class=\"arrow\">↓<\u002Fdiv>\n          <div class=\"step\" style=\"position:relative;\">\n            <span class=\"k\">2nd msg<\u002Fspan><span class=\"v\">cAMP<\u002Fspan>\n            <svg width=\"60\" height=\"22\" viewBox=\"0 0 60 22\" style=\"margin-left:auto\" id=\"gs-camp\">\n              <circle class=\"d\" cx=\"6\" cy=\"11\" r=\"3\" fill=\"#2c5d87\" opacity=\"0\"><\u002Fcircle>\n              <circle class=\"d\" cx=\"16\" cy=\"11\" r=\"3\" fill=\"#2c5d87\" opacity=\"0\"><\u002Fcircle>\n              <circle class=\"d\" cx=\"26\" cy=\"11\" r=\"3\" fill=\"#2c5d87\" opacity=\"0\"><\u002Fcircle>\n              <circle class=\"d\" cx=\"36\" cy=\"11\" r=\"3\" fill=\"#2c5d87\" opacity=\"0\"><\u002Fcircle>\n              <circle class=\"d\" cx=\"46\" cy=\"11\" r=\"3\" fill=\"#2c5d87\" opacity=\"0\"><\u002Fcircle>\n              <circle class=\"d\" cx=\"56\" cy=\"11\" r=\"3\" fill=\"#2c5d87\" opacity=\"0\"><\u002Fcircle>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"arrow\">↓<\u002Fdiv>\n          <div class=\"step\"><span class=\"k\">Kinase<\u002Fspan><span class=\"v\">PKA ↑<\u002Fspan><\u002Fdiv>\n          <div class=\"outcome\">↑ Protein phosphorylation<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Gi -->\n        <div class=\"pcol gi\" data-col=\"gi\">\n          <div class=\"header\"><span class=\"dot\"><\u002Fspan><span class=\"name\" style=\"color:var(--accent-red)\">Gi pathway<\u002Fspan><\u002Fdiv>\n          <div class=\"step\"><span class=\"k\">Signal<\u002Fspan><span class=\"v\">Dopamine<\u002Fspan><\u002Fdiv>\n          <div class=\"arrow\">↓<\u002Fdiv>\n          <div class=\"step\"><span class=\"k\">Receptor<\u002Fspan><span class=\"v\">D2<\u002Fspan><\u002Fdiv>\n          <div class=\"arrow\">↓<\u002Fdiv>\n          <div class=\"step\"><span class=\"k\">G-protein<\u002Fspan><span class=\"v\">Gi<\u002Fspan><\u002Fdiv>\n          <div class=\"arrow\">↓<\u002Fdiv>\n          <div class=\"step\">\n            <span class=\"k\">Effector<\u002Fspan><span class=\"v\">Adenylyl cyclase<\u002Fspan>\n            <span style=\"margin-left:auto; color:var(--accent-red); font-weight:800; font-size:16px\" id=\"gi-minus\">⊖<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"arrow\">↓<\u002Fdiv>\n          <div class=\"step\" style=\"position:relative;\">\n            <span class=\"k\">2nd msg<\u002Fspan><span class=\"v\">cAMP ↓<\u002Fspan>\n            <svg width=\"60\" height=\"22\" viewBox=\"0 0 60 22\" style=\"margin-left:auto\" id=\"gi-camp\">\n              <circle class=\"d\" cx=\"6\" cy=\"11\" r=\"3\" fill=\"#b45341\"><\u002Fcircle>\n              <circle class=\"d\" cx=\"16\" cy=\"11\" r=\"3\" fill=\"#b45341\"><\u002Fcircle>\n              <circle class=\"d\" cx=\"26\" cy=\"11\" r=\"3\" fill=\"#b45341\"><\u002Fcircle>\n              <circle class=\"d\" cx=\"36\" cy=\"11\" r=\"3\" fill=\"#b45341\"><\u002Fcircle>\n              <circle class=\"d\" cx=\"46\" cy=\"11\" r=\"3\" fill=\"#b45341\"><\u002Fcircle>\n              <circle class=\"d\" cx=\"56\" cy=\"11\" r=\"3\" fill=\"#b45341\"><\u002Fcircle>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"arrow\">↓<\u002Fdiv>\n          <div class=\"step\"><span class=\"k\">Kinase<\u002Fspan><span class=\"v\">PKA ↓<\u002Fspan><\u002Fdiv>\n          <div class=\"outcome\">↓ Protein phosphorylation<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Gq -->\n        <div class=\"pcol gq\" data-col=\"gq\">\n          <div class=\"header\"><span class=\"dot\"><\u002Fspan><span class=\"name\" style=\"color:#3d7a52\">Gq pathway<\u002Fspan><\u002Fdiv>\n          <div class=\"step\"><span class=\"k\">Signal<\u002Fspan><span class=\"v\">Glutamate<\u002Fspan><\u002Fdiv>\n          <div class=\"arrow\">↓<\u002Fdiv>\n          <div class=\"step\"><span class=\"k\">Receptor<\u002Fspan><span class=\"v\">mGluR<\u002Fspan><\u002Fdiv>\n          <div class=\"arrow\">↓<\u002Fdiv>\n          <div class=\"step\"><span class=\"k\">G-protein<\u002Fspan><span class=\"v\">Gq<\u002Fspan><\u002Fdiv>\n          <div class=\"arrow\">↓<\u002Fdiv>\n          <div class=\"step\"><span class=\"k\">Effector<\u002Fspan><span class=\"v\">Phospholipase C<\u002Fspan><\u002Fdiv>\n          <div class=\"arrow\">↓<\u002Fdiv>\n          <div class=\"step\" style=\"gap:14px\" id=\"gq-split\">\n            <div style=\"display:flex;flex-direction:column;align-items:flex-start\">\n              <span class=\"k\">2nd msg<\u002Fspan><span class=\"v\">IP₃<\u002Fspan>\n              <span style=\"font-size:11px;color:var(--muted)\">→ Ca²⁺ release<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"width:1px; height:36px; background:var(--hair); margin:0 4px\"><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:flex-start\">\n              <span class=\"k\">2nd msg<\u002Fspan><span class=\"v\">DAG<\u002Fspan>\n              <span style=\"font-size:11px;color:var(--muted)\">→ PKC activation<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"arrow\">↓<\u002Fdiv>\n          <div class=\"step\"><span class=\"k\">Kinase<\u002Fspan><span class=\"v\">PKC ↑<\u002Fspan><\u002Fdiv>\n          <div class=\"outcome\">↑ Phosphorylation (different route)<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footer-line\" id=\"s6-footer\">Not a single line — a routing system.<\u002Fdiv>\n      <div class=\"notes\">\n        <button class=\"notes-toggle\" data-notes-toggle=\"\">Hide notes<\u002Fbutton>\n        <div class=\"label\">Speaker notes<\u002Fdiv>\n        <div class=\"body\"><strong>Gs:<\u002Fstrong> Once the G-protein is active, which effector it targets depends on which type is involved. Gs activates adenylyl cyclase, which converts ATP into cAMP — a major second messenger. cAMP then activates PKA, which phosphorylates target proteins and increases cellular activity. One receptor, one binding event, thousands of cAMP molecules produced downstream. <strong>Gi and Gq:<\u002Fstrong> Gi inhibits adenylyl cyclase, so cAMP levels drop and PKA activity decreases — a suppression of that branch. Gq takes a completely different route. It activates phospholipase C, which produces two second messengers at once: IP₃ and DAG. IP₃ triggers calcium release; DAG activates PKC. The takeaway: G-protein signaling is not a single line — it's a routing system.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SLIDE 7 -->\n    <section class=\"slide s7\" data-slide=\"7\">\n      <div class=\"eyebrow\">07 · Why this design<\u002Fdiv>\n      <h2>Why use this pathway?<\u002Fh2>\n      <div class=\"why\">\n        <div class=\"why-card\" data-why=\"amp\">\n          <div class=\"label\">Advantage 01<\u002Fdiv>\n          <div class=\"name\">Amplification<\u002Fdiv>\n          <div class=\"desc\">1 receptor → many G-proteins → many enzymes → many second messengers.<\u002Fdiv>\n          <div class=\"visual\">\n            <svg viewBox=\"0 0 280 110\" width=\"100%\" height=\"110\" id=\"amp-svg\">\n              <!-- 1 receptor -->\n              <circle cx=\"20\" cy=\"55\" r=\"6\" fill=\"#2d5a3d\"><\u002Fcircle>\n              <!-- spreading dots cloud -->\n              <g id=\"amp-dots\"><\u002Fg>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"counter\" id=\"amp-counter\">×0<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"why-card\" data-why=\"div\">\n          <div class=\"label\">Advantage 02<\u002Fdiv>\n          <div class=\"name\">Diversity<\u002Fdiv>\n          <div class=\"desc\">One receptor family routes to multiple, distinct outcomes.<\u002Fdiv>\n          <div class=\"visual\">\n            <svg viewBox=\"0 0 280 130\" width=\"100%\" height=\"130\" id=\"div-svg\">\n              <circle cx=\"40\" cy=\"65\" r=\"9\" fill=\"#2d5a3d\"><\u002Fcircle>\n              <text x=\"40\" y=\"100\" text-anchor=\"middle\" font-size=\"9\" fill=\"#5d6b62\">RECEPTOR<\u002Ftext>\n              <path id=\"div-p1\" d=\"M 50 60 Q 130 30 240 30\" stroke=\"#2c5d87\" stroke-width=\"2.5\" fill=\"none\" stroke-dasharray=\"280\" stroke-dashoffset=\"280\" marker-end=\"url(#div-h1)\"><\u002Fpath>\n              <path id=\"div-p2\" d=\"M 50 65 Q 130 65 240 65\" stroke=\"#b45341\" stroke-width=\"2.5\" fill=\"none\" stroke-dasharray=\"280\" stroke-dashoffset=\"280\" marker-end=\"url(#div-h2)\"><\u002Fpath>\n              <path id=\"div-p3\" d=\"M 50 70 Q 130 100 240 100\" stroke=\"#3d7a52\" stroke-width=\"2.5\" fill=\"none\" stroke-dasharray=\"280\" stroke-dashoffset=\"280\" marker-end=\"url(#div-h3)\"><\u002Fpath>\n              <defs>\n                <marker id=\"div-h1\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto\"><path d=\"M0 0 L10 5 L0 10 Z\" fill=\"#2c5d87\"><\u002Fpath><\u002Fmarker>\n                <marker id=\"div-h2\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto\"><path d=\"M0 0 L10 5 L0 10 Z\" fill=\"#b45341\"><\u002Fpath><\u002Fmarker>\n                <marker id=\"div-h3\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto\"><path d=\"M0 0 L10 5 L0 10 Z\" fill=\"#3d7a52\"><\u002Fpath><\u002Fmarker>\n              <\u002Fdefs>\n              <text x=\"248\" y=\"33\" font-size=\"10\" fill=\"#2c5d87\" font-weight=\"700\">cAMP ↑<\u002Ftext>\n              <text x=\"248\" y=\"68\" font-size=\"10\" fill=\"#b45341\" font-weight=\"700\">cAMP ↓<\u002Ftext>\n              <text x=\"248\" y=\"103\" font-size=\"10\" fill=\"#3d7a52\" font-weight=\"700\">Ca²⁺ / PKC<\u002Ftext>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"counter\" style=\"font-size:18px; color:var(--muted); font-weight:600\">3 distinct routes<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"why-card\" data-why=\"mod\">\n          <div class=\"label\">Advantage 03<\u002Fdiv>\n          <div class=\"name\">Modulation<\u002Fdiv>\n          <div class=\"desc\">Slower, but adjustable, sustained, and able to reach the nucleus.<\u002Fdiv>\n          <div class=\"visual\">\n            <svg viewBox=\"0 0 280 130\" width=\"100%\" height=\"130\" id=\"mod-svg\">\n              <line x1=\"20\" y1=\"100\" x2=\"260\" y2=\"100\" stroke=\"#d8d6cc\" stroke-width=\"1\"><\u002Fline>\n              <line x1=\"20\" y1=\"20\" x2=\"20\" y2=\"100\" stroke=\"#d8d6cc\" stroke-width=\"1\"><\u002Fline>\n              <text x=\"20\" y=\"120\" font-size=\"9\" fill=\"#5d6b62\">time<\u002Ftext>\n              <!-- ionotropic spike -->\n              <path id=\"mod-spike\" d=\"M 20 100 L 50 100 L 60 30 L 70 100 L 260 100\" stroke=\"#2c5d87\" stroke-width=\"2\" fill=\"none\" stroke-dasharray=\"400\" stroke-dashoffset=\"400\"><\u002Fpath>\n              <text x=\"80\" y=\"40\" font-size=\"10\" fill=\"#2c5d87\" font-weight=\"700\">ionotropic<\u002Ftext>\n              <!-- metabotropic sustained -->\n              <path id=\"mod-curve\" d=\"M 20 100 C 50 100 70 60 110 55 C 160 50 200 60 260 70\" stroke=\"#3d7a52\" stroke-width=\"2\" fill=\"none\" stroke-dasharray=\"400\" stroke-dashoffset=\"400\"><\u002Fpath>\n              <text x=\"170\" y=\"50\" font-size=\"10\" fill=\"#3d7a52\" font-weight=\"700\">metabotropic<\u002Ftext>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"counter\" style=\"font-size:18px; color:var(--muted); font-weight:600\">seconds → hours<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"closing\">\n        <div class=\"echo\" id=\"s7-echo\">\"How do G-proteins convert receptor activation into a cellular response?\"<\u002Fdiv>\n        <div class=\"lines\" id=\"s7-lines\">\n          <div class=\"line\">Cells don't use G-proteins because they're <em>better<\u002Fem>.<\u002Fdiv>\n          <div class=\"line\">They use them because they're <em>complementary<\u002Fem>.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"notes\">\n        <button class=\"notes-toggle\" data-notes-toggle=\"\">Hide notes<\u002Fbutton>\n        <div class=\"label\">Speaker notes<\u002Fdiv>\n        <div class=\"body\">Three reasons the cell uses G-proteins. First, amplification: one receptor activates multiple G-proteins, each activates an enzyme, each enzyme produces many second messengers. One norepinephrine molecule can lead to tens of thousands of phosphate transfers. Second, diversity: Gs, Gi, and Gq each lead to completely different outputs. Third, modulation: G-protein cascades are slower but adjustable, sustained, and can reach the nucleus to alter gene expression for hours or days. Cells don't use G-proteins because they're always better than ionotropic receptors. They use them because they're complementary. When the cell needs more control, more possible outputs, more flexibility, it uses G-proteins. That's how receptor activation is converted into a cellular response.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- chrome -->\n<div class=\"chrome\">\n  <div class=\"title\">G-Proteins · Cellular Signal Transduction<\u002Fdiv>\n  <div><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"nav\">\n  <button id=\"prev\" aria-label=\"Previous slide\" title=\"Previous (←)\">\n    <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\"><path d=\"M9 2 L4 7 L9 12\" stroke=\"currentColor\" stroke-width=\"1.6\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n  <\u002Fbutton>\n  <div class=\"count\"><span id=\"cur\">1<\u002Fspan> / <span id=\"tot\">7<\u002Fspan><\u002Fdiv>\n  <button id=\"next\" aria-label=\"Next slide\" title=\"Next (→)\">\n    <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\"><path d=\"M5 2 L10 7 L5 12\" stroke=\"currentColor\" stroke-width=\"1.6\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n  <\u002Fbutton>\n<\u002Fdiv>\n\n<script src=\"2ba045a5-4f28-4a0c-b6a6-adcf0970a32e\"><\u002Fscript>\n<script>\n/* ============== Stage scaling ============== */\nfunction fitStage(){\n  const c = document.getElementById('canvas');\n  const W = window.innerWidth, H = window.innerHeight;\n  const s = Math.min(W/1280, H/800) * 0.96;\n  const tx = (W - 1280 * s) / 2;\n  const ty = (H - 800 * s) / 2;\n  c.style.transform = `translate(${tx}px, ${ty}px) scale(${s})`;\n}\nwindow.addEventListener('resize', fitStage);\nfitStage();\n\n/* ============== Slide manager ============== */\nconst slides = Array.from(document.querySelectorAll('.slide'));\nconst total = slides.length;\ndocument.getElementById('tot').textContent = total;\nlet cur = 0;\nlet isAnimating = false;\n\nfunction showSlide(idx, dir = 1){\n  if (idx < 0 || idx >= total || isAnimating) return;\n  isAnimating = true;\n  const out = slides[cur];\n  const inEl = slides[idx];\n  inEl.classList.add('active');\n\n  // transition\n  gsap.fromTo(out, {opacity:1, x:0}, {opacity:0, x: -30*dir, duration:.35, ease:\"power2.in\",\n    onComplete: () => out.classList.remove('active')});\n  gsap.fromTo(inEl, {opacity:0, x: 30*dir}, {opacity:1, x:0, duration:.45, ease:\"power2.out\",\n    onComplete: () => {\n      cur = idx;\n      isAnimating = false;\n      document.getElementById('cur').textContent = idx + 1;\n      try { window.parent && window.parent.postMessage({slideIndexChanged: idx}, '*'); } catch(e){}\n      runSlideAnimation(idx);\n    }\n  });\n}\n\ndocument.getElementById('next').addEventListener('click', (e) => { e.stopPropagation(); nextAction(); });\ndocument.getElementById('prev').addEventListener('click', (e) => { e.stopPropagation(); prevAction(); });\ndocument.addEventListener('keydown', (e) => {\n  if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); nextAction(); }\n  else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prevAction(); }\n});\n// Click anywhere on the slide canvas advances; right-click goes back\ndocument.querySelector('.canvas').addEventListener('click', (e) => {\n  // ignore clicks on chrome (nav buttons handle their own)\n  if (e.target.closest('.nav') || e.target.closest('.notes')) return;\n  nextAction();\n});\ndocument.querySelector('.canvas').addEventListener('contextmenu', (e) => {\n  if (e.target.closest('.nav') || e.target.closest('.notes')) return;\n  e.preventDefault();\n  prevAction();\n});\n\n/* ============== Notes toggle ============== */\n/* ============== Notes toggle ============== */\nlet notesHidden = false;\nfunction toggleNotes(){\n  notesHidden = !notesHidden;\n  document.body.classList.toggle('notes-off', notesHidden);\n  document.querySelectorAll('.notes').forEach(n => n.classList.toggle('hidden', notesHidden));\n}\ndocument.addEventListener('keydown', (e) => {\n  if (e.key === 'n' || e.key === 'N') { e.preventDefault(); toggleNotes(); }\n});\n\n/* ============== Per-slide animations ============== */\n\nfunction animateSlide1(){\n  const slide = slides[0];\n  gsap.set('.s1 h1', {opacity:0, y:-30});\n  gsap.set('#s1-question', {opacity:0, y:10});\n  gsap.set('#s1-question .highlight', {width:0});\n  gsap.set('#s1-rule', {opacity:0, scaleX:0});\n  gsap.set('.s1 .kicker', {opacity:0});\n  gsap.set('.s1 .meta', {opacity:0});\n\n  // Build subtitle character spans\n  const subEl = document.getElementById('s1-sub');\n  const subText = \"G-proteins: not the signal, not the response — the coupling machinery in between.\";\n  subEl.innerHTML = subText.split('').map(c => `<span class=\"ch\">${c === ' ' ? '&nbsp;' : c}<\u002Fspan>`).join('');\n\n  const tl = gsap.timeline({paused:true});\n  tl.addLabel(\"step1\")\n    .to('.s1 .kicker', {opacity:1, duration:.4})\n    .to('.s1 h1', {opacity:1, y:0, duration:.7, ease:\"power3.out\"}, \"-=0.1\")\n    .addLabel(\"step2\")\n    .to('#s1-question', {opacity:1, y:0, duration:.5, ease:\"power2.out\"}, \"+=0.1\")\n    .to('#s1-question .highlight', {width:'100%', duration:.6, ease:\"power2.inOut\"}, \"-=0.1\")\n    .addLabel(\"step3\")\n    .to('.s1 #s1-sub .ch', {opacity:1, duration:.02, stagger:0.012}, \"+=0.1\")\n    .to('#s1-rule', {opacity:1, scaleX:1, duration:.5, ease:\"power2.out\"}, \"-=0.1\")\n    .to('.s1 .meta', {opacity:1, duration:.4}, \"-=0.2\");\n  return tl;\n}\n\nfunction animateSlide2(){\n  gsap.set('.s2 .eyebrow, .s2 h2', {opacity:0, y:-10});\n  gsap.set('.s2 .synapse', {opacity:0});\n  gsap.set('#pre-group, #vesicles, #post-group, #cleft-label', {opacity:0});\n  gsap.set('#co-pre, #co-nt, #co-cleft, #co-post, #co-rcpt', {opacity:0});\n  gsap.set('.halo', {attr:{r:0}});\n  gsap.set('.eff', {attr:{r:0}});\n  gsap.set('.rcpt rect', {fill:'#7a5fa8'});\n  gsap.set('.flow-step, .flow-arrow', {opacity:0, y:10});\n\n  // Build neurotransmitter dots dynamically\n  const ntGroup = document.getElementById('nt-dots');\n  ntGroup.innerHTML = '';\n  const releaseAnchors = [\n    {sx:245, ex:245}, {sx:245, ex:255}, {sx:245, ex:235},\n    {sx:310, ex:310}, {sx:310, ex:300}, {sx:310, ex:320},\n    {sx:370, ex:370}, {sx:370, ex:360}, {sx:370, ex:380},\n    {sx:265, ex:285}, {sx:330, ex:345}, {sx:355, ex:340}\n  ];\n  releaseAnchors.forEach(a => {\n    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');\n    c.setAttribute('class', 'nt');\n    c.setAttribute('cx', a.sx);\n    c.setAttribute('cy', 325);\n    c.setAttribute('r', 3);\n    c.setAttribute('fill', '#3a78b8');\n    c.setAttribute('opacity', 0);\n    c.dataset.ex = a.ex;\n    ntGroup.appendChild(c);\n  });\n\n  const tl = gsap.timeline({paused:true});\n\n  // STEP 1 — title\n  tl.addLabel(\"step1\")\n    .to('.s2 .eyebrow', {opacity:1, y:0, duration:.4})\n    .to('.s2 h2', {opacity:1, y:0, duration:.5}, \"-=0.2\")\n    .to('.s2 .synapse', {opacity:1, duration:.3}, \"-=0.1\");\n\n  // STEP 2 — presynaptic neuron + vesicles + callout\n  tl.addLabel(\"step2\")\n    .to('#pre-group', {opacity:1, duration:.7, ease:\"power2.out\"}, \"+=0.1\")\n    .fromTo('#pre-group', {y:-30, scale:0.96, transformOrigin:\"50% 0%\"}, {y:0, scale:1, duration:.7, ease:\"power2.out\"}, \"<\")\n    .to('#vesicles', {opacity:1, duration:.4}, \"-=0.3\")\n    .from('.ves', {scale:0, opacity:0, transformOrigin:\"50% 50%\", duration:.35, stagger:0.04, ease:\"back.out(1.5)\"}, \"-=0.3\")\n    .to('#co-pre', {opacity:1, duration:.4}, \"-=0.2\");\n\n  // STEP 3 — postsynaptic membrane + cleft + callouts\n  tl.addLabel(\"step3\")\n    .to('#post-group', {opacity:1, duration:.5}, \"+=0.1\")\n    .fromTo('#post-group', {y:30}, {y:0, duration:.5, ease:\"power2.out\"}, \"<\")\n    .to('#cleft-label', {opacity:1, duration:.4}, \"-=0.2\")\n    .to('#co-cleft', {opacity:1, duration:.4}, \"<\")\n    .to('#co-post', {opacity:1, duration:.4}, \"+=0.05\");\n\n  // STEP 4 — neurotransmitters release, bind, activate effectors\n  tl.addLabel(\"step4\")\n    .to('.nt', {opacity:1, duration:.05, stagger:0.04}, \"+=0.1\")\n    .to('#co-nt', {opacity:1, duration:.4}, \"<\")\n    .to('.nt', {attr:{cy:392}, duration:0.7, ease:\"power2.in\", stagger:0.03}, \"-=0.2\")\n    .to('.rcpt rect', {fill:'#a88fd0', duration:0.3, stagger:0.08}, \"-=0.2\")\n    .to('.halo', {attr:{r:30}, duration:0.5, stagger:0.08, ease:\"power2.out\"}, \"-=0.3\")\n    .to('.eff', {attr:{r:5}, duration:.4, stagger:0.08, ease:\"back.out(1.6)\"}, \"-=0.2\")\n    .to('#co-rcpt', {opacity:1, duration:.4}, \"-=0.2\");\n\n  // STEP 5 — flowchart abstraction\n  tl.addLabel(\"step5\");\n  const stepsEl = document.querySelectorAll('.s2 .flow-step');\n  const arrowsEl = document.querySelectorAll('.s2 .flow-arrow');\n  stepsEl.forEach((s, i) => {\n    tl.to(s, {opacity:1, y:0, duration:.35, ease:\"power2.out\"}, i === 0 ? \"+=0.1\" : \"-=0.05\");\n    if (arrowsEl[i]) tl.to(arrowsEl[i], {opacity:1, duration:.25}, \"-=0.15\");\n  });\n  return tl;\n}\n\nfunction buildBilayer(topId, botId){\n  const top = document.getElementById(topId);\n  const bot = document.getElementById(botId);\n  if (!top || !bot) return;\n  top.innerHTML = ''; bot.innerHTML = '';\n  for (let x = 8; x < 600; x += 12){\n    const cT = document.createElementNS('http://www.w3.org/2000/svg', 'circle');\n    cT.setAttribute('cx', x); cT.setAttribute('cy', 165); cT.setAttribute('r', 5.5);\n    top.appendChild(cT);\n    const cB = document.createElementNS('http://www.w3.org/2000/svg', 'circle');\n    cB.setAttribute('cx', x); cB.setAttribute('cy', 188); cB.setAttribute('r', 5.5);\n    bot.appendChild(cB);\n  }\n}\n\nfunction animateSlide3(){\n  buildBilayer('iono-heads-top', 'iono-heads-bot');\n  buildBilayer('meta-heads-top', 'meta-heads-bot');\n\n  gsap.set('.s3 .eyebrow, .s3 h2', {opacity:0, y:-10});\n  gsap.set('#panel-iono, #panel-meta', {opacity:0, y:14});\n  gsap.set('.s3 .speed', {opacity:0});\n  gsap.set('#s3-insight', {opacity:0, y:10});\n\n  // iono initial state\n  gsap.set('#iono-nt-left', {opacity:0, y:-30});\n  gsap.set('#iono-nt-r1, #iono-nt-r2', {opacity:0});\n  gsap.set('#iono-right', {opacity:0});\n  gsap.set('.fion', {opacity:0});\n  gsap.set('.oion', {opacity:0});\n  gsap.set('#iono-cb1, #iono-cb2, #iono-cb3', {opacity:0});\n\n  // meta initial state\n  gsap.set('#meta-nt-far1, #meta-nt-far2, #meta-nt-binding', {opacity:0});\n  gsap.set('#meta-nt-bound', {opacity:0});\n  gsap.set('#meta-right', {opacity:0});\n  gsap.set('#meta-gp-detached', {opacity:0});\n  gsap.set('#meta-gp-active', {opacity:0});\n  gsap.set('#meta-starburst', {opacity:0, transformOrigin:\"50% 50%\", scale:0.5});\n  gsap.set('#meta-cb1, #meta-cb2, #meta-cb3', {opacity:0});\n\n  const tl = gsap.timeline({paused:true});\n\n  // STEP 1: Title\n  tl.addLabel(\"step1\")\n    .to('.s3 .eyebrow', {opacity:1, y:0, duration:.4})\n    .to('.s3 h2', {opacity:1, y:0, duration:.4}, \"-=0.2\");\n\n  // STEP 2: Class I — Ionotropic\n  tl.addLabel(\"step2\")\n    .to('#panel-iono', {opacity:1, y:0, duration:.5}, \"+=0.1\")\n    .to('#iono-cb1', {opacity:1, duration:.4}, \"+=0.2\")\n    .to('#iono-nt-left', {opacity:1, y:0, duration:.5, ease:\"power2.out\"}, \"-=0.2\")\n    .to('#iono-right', {opacity:1, duration:.5}, \"+=0.3\")\n    .to('#iono-nt-r1, #iono-nt-r2', {opacity:1, duration:.4, stagger:0.1}, \"-=0.3\")\n    .to('#iono-cb2', {opacity:1, duration:.4})\n    .to('.fion', {opacity:1, duration:.05, stagger:0.06})\n    .to('.fion', {y:180, duration:.7, ease:\"power2.in\", stagger:0.06}, \"-=0.2\")\n    .to('.oion', {opacity:1, duration:.05, stagger:0.08}, \"-=0.2\")\n    .to('#iono-cb3', {opacity:1, duration:.4}, \"-=0.1\");\n\n  // STEP 3: Class II — Metabotropic\n  tl.addLabel(\"step3\")\n    .to('#panel-meta', {opacity:1, y:0, duration:.5}, \"+=0.1\")\n    .to('#meta-nt-far1, #meta-nt-far2', {opacity:1, duration:.4, stagger:0.1}, \"+=0.1\")\n    .to('#meta-nt-binding', {opacity:1, duration:.4}, \"-=0.1\")\n    .to('#meta-cb1', {opacity:1, duration:.4})\n    .to('#meta-gp-detached', {opacity:1, duration:.5}, \"+=0.2\")\n    .to('#meta-cb2', {opacity:1, duration:.4}, \"-=0.2\")\n    .to('#meta-right', {opacity:1, duration:.5}, \"+=0.4\")\n    .to('#meta-nt-bound', {opacity:1, duration:.4}, \"-=0.3\")\n    .to('#meta-gp-active', {opacity:1, duration:.5}, \"-=0.2\")\n    .to('#meta-starburst', {opacity:1, scale:1, duration:.5, ease:\"back.out(1.6)\"}, \"-=0.2\")\n    .to('#meta-cb3', {opacity:1, duration:.4}, \"-=0.2\");\n\n  // STEP 4: Speed comparison + insight\n  tl.addLabel(\"step4\")\n    .to('.s3 .speed', {opacity:1, duration:.4, stagger:0.1}, \"+=0.1\")\n    .to('#s3-insight', {opacity:1, y:0, duration:.5}, \"+=0.1\");\n\n  return tl;\n}\n\nlet ionoIonInterval = null;\nfunction spawnIonoIons(){\n  const g = document.getElementById('iono-ions');\n  if (!g) return;\n  g.innerHTML = '';\n  let count = 0;\n  const max = 14;\n  if (ionoIonInterval) clearInterval(ionoIonInterval);\n  ionoIonInterval = setInterval(() => {\n    if (count >= max) { clearInterval(ionoIonInterval); return; }\n    const x = 222 + Math.random()*16;\n    const ion = document.createElementNS('http://www.w3.org/2000/svg', 'circle');\n    ion.setAttribute('cx', x);\n    ion.setAttribute('cy', 100);\n    ion.setAttribute('r', 3);\n    ion.setAttribute('fill', '#3d7a52');\n    g.appendChild(ion);\n    gsap.to(ion, {attr:{cy:200}, duration:0.9, ease:\"power1.in\",\n      onComplete:() => ion.remove()});\n    count++;\n  }, 140);\n}\n\nfunction animateSlide4(){\n  buildBilayer('m4-heads-top', 'm4-heads-bot');\n\n  gsap.set('.s4 .eyebrow, .s4 h2', {opacity:0, y:-10});\n\n  // Diagram initial state\n  gsap.set('#m4-receptor', {opacity:0});\n  gsap.set('#m4-nt-far', {opacity:0});\n  gsap.set('#m4-nt-bound', {opacity:0});\n  gsap.set('#m4-rec-label', {opacity:0});\n  gsap.set('#m4-gp-rec', {opacity:0});\n  gsap.set('#m4-gp-label', {opacity:0});\n  gsap.set('#m4-burst', {opacity:0, transformOrigin:\"50% 50%\", scale:0.4});\n  gsap.set('#m4-alpha-travel', {opacity:0, x:0, y:0});\n  gsap.set('#m4-effector', {opacity:0});\n  gsap.set('#m4-arrow-eff', {opacity:0});\n  gsap.set('#m4-msg-label, #m4-msg-label2', {opacity:0});\n  gsap.set('.m4msg', {opacity:0});\n  gsap.set('#m4-ions-label', {opacity:0});\n  gsap.set('#m4-arrow-chan', {opacity:0});\n  gsap.set('#m4-channel', {opacity:0});\n  gsap.set('.m4ion', {opacity:0});\n  gsap.set('#m4-ion-flow', {opacity:0});\n\n  // Callouts\n  gsap.set('#m4-cb1, #m4-cb2, #m4-cb3, #m4-cb4, #m4-cb5', {opacity:0});\n\n  // Right column\n  gsap.set('#s4-eq .word', {opacity:0});\n  gsap.set('#s4-deleg', {opacity:0});\n  gsap.set('#s4-deleg .word', {scale:3, opacity:0});\n\n  const tl = gsap.timeline({paused:true});\n\n  // STEP 1 — Title\n  tl.addLabel(\"step1\")\n    .to('.s4 .eyebrow', {opacity:1, y:0, duration:.4})\n    .to('.s4 h2', {opacity:1, y:0, duration:.4}, \"-=0.2\");\n\n  // STEP 2 — Receptor + NT binds (callout 1)\n  tl.addLabel(\"step2\")\n    .to('#m4-receptor', {opacity:1, duration:.5}, \"+=0.1\")\n    .to('#m4-rec-label', {opacity:1, duration:.4}, \"-=0.2\")\n    .to('#m4-nt-far', {opacity:1, duration:.3})\n    .to('#m4-nt-far', {x:100, y:65, duration:.5, ease:\"power2.in\"})\n    .to('#m4-nt-far', {opacity:0, duration:.05})\n    .to('#m4-nt-bound', {opacity:1, duration:.2}, \"<\")\n    .to('#m4-cb1', {opacity:1, duration:.4}, \"-=0.1\");\n\n  // STEP 3 — G-protein activated (callout 2)\n  tl.addLabel(\"step3\")\n    .to('#m4-gp-rec', {opacity:1, duration:.4}, \"+=0.1\")\n    .to('#m4-gp-label', {opacity:1, duration:.3}, \"-=0.2\")\n    .to('#m4-burst', {opacity:1, scale:1, duration:.5, ease:\"back.out(1.6)\"}, \"-=0.1\")\n    .to('#m4-cb2', {opacity:1, duration:.4}, \"-=0.2\");\n\n  // STEP 4 — Effector + α migrates + intracellular messengers (callout 3)\n  tl.addLabel(\"step4\")\n    .to('#m4-effector', {opacity:1, duration:.4}, \"+=0.1\")\n    .to('#m4-alpha-travel', {opacity:1, duration:.2}, \"+=0.1\")\n    .to('#m4-alpha-travel', {x:90, duration:.7, ease:\"power2.inOut\"})\n    .to('#m4-arrow-eff', {opacity:1, duration:.4}, \"-=0.4\")\n    .to('#m4-msg-label, #m4-msg-label2', {opacity:1, duration:.3}, \"-=0.2\")\n    .to('.m4msg', {opacity:1, duration:.05, stagger:0.06})\n    .to('#m4-ions-label', {opacity:1, duration:.3}, \"-=0.1\")\n    .to('#m4-cb3', {opacity:1, duration:.4}, \"-=0.2\");\n\n  // STEP 5 — Channel opens + ions flow (callouts 4 & 5)\n  tl.addLabel(\"step5\")\n    .to('#m4-channel', {opacity:1, duration:.4}, \"+=0.1\")\n    .to('#m4-arrow-chan', {opacity:1, duration:.4}, \"-=0.2\")\n    .to('#m4-cb4', {opacity:1, duration:.4})\n    .to('.m4ion', {opacity:1, duration:.05, stagger:0.05})\n    .to('#m4-ion-flow', {opacity:1, duration:.1})\n    .to('#m4-ion-flow', {y:100, duration:.6, ease:\"power2.in\"})\n    .to('#m4-cb5', {opacity:1, duration:.4}, \"-=0.4\");\n\n  // STEP 6 — equation + delegation\n  tl.addLabel(\"step6\")\n    .to('#s4-eq .word', {opacity:1, duration:.05, stagger:0.06}, \"+=0.1\")\n    .to('#s4-deleg', {opacity:1, duration:.4}, \"-=0.2\")\n    .to('#s4-deleg .word', {scale:1, opacity:1, duration:.7, ease:\"back.out(1.6)\"}, \"-=0.2\");\n  return tl;\n}\n\nfunction animateSlide5(){\n  gsap.set('.s5 .eyebrow, .s5 h2', {opacity:0, y:-10});\n  gsap.set('#trimer', {opacity:0});\n  gsap.set('#c-alpha', {x:0, y:0});\n  gsap.set('#c-beta', {x:0, y:0});\n  gsap.set('#c-gamma', {x:0, y:0});\n  gsap.set('.state', {opacity:0, x:20});\n  gsap.set('#s5-insight', {opacity:0});\n\n  const tl = gsap.timeline({paused:true});\n  tl.addLabel(\"step1\")\n    .to('.s5 .eyebrow', {opacity:1, y:0, duration:.4})\n    .to('.s5 h2', {opacity:1, y:0, duration:.4}, \"-=0.2\")\n    .to('#trimer', {opacity:1, duration:.4});\n\n  // STEP 2: resting (already showing GDP)\n  tl.addLabel(\"step2\")\n    .to('.state[data-state=\"1\"]', {opacity:1, x:0, duration:.4}, \"+=0.1\");\n\n  // STEP 3: GDP flies out, GTP flies in\n  tl.addLabel(\"step3\")\n    .to('#c-nuc', {x:120, y:-80, opacity:0, duration:.6, ease:\"power2.in\"}, \"+=0.2\")\n    .add(() => {\n      const t = document.getElementById('c-nuc-text');\n      const box = document.getElementById('c-nuc-box');\n      t.textContent = 'GTP';\n      t.setAttribute('fill', '#3d7a52');\n      box.setAttribute('stroke', '#3d7a52');\n    })\n    .fromTo('#c-nuc', {x:-120, y:80, opacity:0}, {x:0, y:0, opacity:1, duration:.6, ease:\"power2.out\"})\n    .to('#c-alpha circle', {fill:'#3d7a52', duration:.3}, \"-=0.2\")\n    .to('.state[data-state=\"2\"]', {opacity:1, x:0, duration:.4}, \"-=0.2\");\n\n  // STEP 4: dissociate\n  tl.addLabel(\"step4\")\n    .to('#c-alpha', {x:-90, y:60, duration:.7, ease:\"power2.out\"}, \"+=0.2\")\n    .to('#c-nuc', {x:-90, y:60, duration:.7, ease:\"power2.out\"}, \"<\")\n    .to('#c-beta', {x:50, y:-30, duration:.7, ease:\"power2.out\"}, \"<\")\n    .to('#c-gamma', {x:60, y:-40, duration:.7, ease:\"power2.out\"}, \"<\");\n\n  // STEP 5: hydrolysis + reassembly\n  tl.addLabel(\"step5\")\n    .add(() => {\n      const t = document.getElementById('c-nuc-text');\n      const box = document.getElementById('c-nuc-box');\n      t.textContent = 'GDP';\n      t.setAttribute('fill', '#5d6b62');\n      box.setAttribute('stroke', '#2d5a3d');\n    }, \"+=0.2\")\n    .to('#c-alpha circle', {fill:'#caa24a', duration:.4})\n    .to('#c-alpha, #c-nuc', {x:0, y:0, duration:.7, ease:\"power2.inOut\"}, \"+=0.2\")\n    .to('#c-beta, #c-gamma', {x:0, y:0, duration:.7, ease:\"power2.inOut\"}, \"<\")\n    .to('.state[data-state=\"3\"]', {opacity:1, x:0, duration:.4}, \"-=0.2\")\n    .to('#s5-insight', {opacity:1, duration:.5}, \"+=0.1\");\n  return tl;\n}\n\nfunction animateSlide6(){\n  gsap.set('.s6 .eyebrow, .s6 h2', {opacity:0, y:-10});\n  gsap.set('.pcol', {opacity:0, y:20});\n  gsap.set('#gs-camp .d, #gi-camp .d', {opacity:0});\n  gsap.set('#gi-minus', {scale:0, transformOrigin:\"50% 50%\"});\n  gsap.set('#s6-footer', {opacity:0, y:20});\n\n  const tl = gsap.timeline({paused:true});\n  tl.addLabel(\"step1\")\n    .to('.s6 .eyebrow', {opacity:1, y:0, duration:.4})\n    .to('.s6 h2', {opacity:1, y:0, duration:.4}, \"-=0.2\")\n    .addLabel(\"step2\")\n    .to('.pcol[data-col=\"gs\"]', {opacity:1, y:0, duration:.5}, \"+=0.1\")\n    .to('#gs-camp .d', {opacity:1, duration:.05, stagger:0.08}, \"-=0.1\")\n    .addLabel(\"step3\")\n    .to('.pcol[data-col=\"gi\"]', {opacity:1, y:0, duration:.5}, \"+=0.2\")\n    .to('#gi-minus', {scale:1, duration:.35, ease:\"back.out(1.8)\"}, \"-=0.2\")\n    .fromTo('#gi-camp .d', {opacity:1}, {opacity:0.15, duration:.05, stagger:0.07}, \"-=0.1\")\n    .addLabel(\"step4\")\n    .to('.pcol[data-col=\"gq\"]', {opacity:1, y:0, duration:.5}, \"+=0.2\")\n    .to('#s6-footer', {opacity:1, y:0, duration:.5}, \"+=0.2\");\n  return tl;\n}\n\nfunction animateSlide7(){\n  gsap.set('.s7 .eyebrow, .s7 h2', {opacity:0, y:-10});\n  gsap.set('.why-card', {opacity:0, y:14});\n  gsap.set('#div-p1, #div-p2, #div-p3', {strokeDashoffset:280});\n  gsap.set('#mod-spike, #mod-curve', {strokeDashoffset:400});\n  gsap.set('#s7-echo', {opacity:0});\n  gsap.set('#s7-lines', {opacity:0, y:10});\n\n  // amp dots: clear and respawn\n  const ampDots = document.getElementById('amp-dots');\n  ampDots.innerHTML = '';\n  for (let i = 0; i < 28; i++){\n    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');\n    const x = 60 + (i % 7) * 32 + Math.random()*8;\n    const y = 20 + Math.floor(i/7) * 22 + Math.random()*4;\n    c.setAttribute('cx', x);\n    c.setAttribute('cy', y);\n    c.setAttribute('r', 3);\n    c.setAttribute('fill', '#caa24a');\n    c.setAttribute('opacity', 0);\n    ampDots.appendChild(c);\n  }\n\n  const tl = gsap.timeline({paused:true});\n  tl.addLabel(\"step1\")\n    .to('.s7 .eyebrow', {opacity:1, y:0, duration:.4})\n    .to('.s7 h2', {opacity:1, y:0, duration:.4}, \"-=0.2\");\n\n  // STEP 2: amplification\n  tl.addLabel(\"step2\")\n    .to('.why-card[data-why=\"amp\"]', {opacity:1, y:0, duration:.5}, \"+=0.1\")\n    .to('#amp-dots circle', {opacity:1, duration:.05, stagger:0.04}, \"-=0.1\")\n    .to({val:0}, {val:10000, duration:1.4, ease:\"power2.out\",\n      onUpdate: function(){\n        const v = Math.round(this.targets()[0].val);\n        document.getElementById('amp-counter').textContent = '×' + v.toLocaleString();\n      }}, \"-=0.5\");\n\n  // STEP 3: diversity\n  tl.addLabel(\"step3\")\n    .to('.why-card[data-why=\"div\"]', {opacity:1, y:0, duration:.5}, \"+=0.2\")\n    .to('#div-p1', {strokeDashoffset:0, duration:.7, ease:\"power2.out\"}, \"-=0.1\")\n    .to('#div-p2', {strokeDashoffset:0, duration:.7, ease:\"power2.out\"}, \"-=0.55\")\n    .to('#div-p3', {strokeDashoffset:0, duration:.7, ease:\"power2.out\"}, \"-=0.55\");\n\n  // STEP 4: modulation\n  tl.addLabel(\"step4\")\n    .to('.why-card[data-why=\"mod\"]', {opacity:1, y:0, duration:.5}, \"+=0.2\")\n    .to('#mod-spike', {strokeDashoffset:0, duration:.45, ease:\"power2.out\"}, \"-=0.1\")\n    .to('#mod-curve', {strokeDashoffset:0, duration:1.4, ease:\"power2.inOut\"}, \"-=0.2\");\n\n  // STEP 5: closing\n  tl.addLabel(\"step5\")\n    .to('#s7-echo', {opacity:0.18, duration:.7}, \"+=0.2\")\n    .to('#s7-lines', {opacity:1, y:0, duration:.6}, \"-=0.4\");\n  return tl;\n}\n\nconst ANIMATORS = [animateSlide1, animateSlide2, animateSlide3, animateSlide4, animateSlide5, animateSlide6, animateSlide7];\n/* ============== Navigation with intra-slide steps ============== */\nconst slideTimelines = {};\nconst slideSteps = {};\nconst slideStepIdx = {};\n\nfunction getStepLabels(tl){\n  // collect labels in order; gsap stores labels in tl.labels\n  const labels = tl.labels || {};\n  return Object.keys(labels)\n    .filter(k => /^step\\d+$/.test(k))\n    .sort((a, b) => labels[a] - labels[b]);\n}\n\nfunction nextAction(){\n  if (isAnimating) return;\n  const tl = slideTimelines[cur];\n  if (!tl) { showSlide(cur+1, 1); return; }\n  const labels = slideSteps[cur];\n  const idx = slideStepIdx[cur];\n  // Determine current target endpoint\n  const endOfCurrentStep = idx + 1 < labels.length ? tl.labels[labels[idx+1]] : tl.duration();\n  // If still animating current step, fast-forward to its end\n  if (tl.isActive() && tl.time() < endOfCurrentStep - 0.05){\n    tl.pause(endOfCurrentStep);\n    return;\n  }\n  // Step is complete — advance\n  if (idx + 1 < labels.length){\n    slideStepIdx[cur] = idx + 1;\n    const nextEnd = idx + 2 < labels.length ? tl.labels[labels[idx+2]] : tl.duration();\n    tl.tweenTo(nextEnd, {duration: undefined, ease: \"none\"});\n  } else {\n    showSlide(cur+1, 1);\n  }\n}\n\nfunction prevAction(){\n  if (isAnimating) return;\n  const tl = slideTimelines[cur];\n  if (!tl) { showSlide(cur-1, -1); return; }\n  if (tl.isActive()) tl.pause();\n  const labels = slideSteps[cur];\n  const idx = slideStepIdx[cur];\n  if (idx > 0){\n    slideStepIdx[cur] = idx - 1;\n    // Snap back to end of previous step\n    const target = idx > 1 ? tl.labels[labels[idx-1]] : 0;\n    // If idx-1 is 0 (step1), go back to time 0 then play to step2\n    if (idx - 1 === 0){\n      tl.pause(0);\n      const endOfStep1 = labels.length > 1 ? labels[1] : tl.duration();\n      tl.tweenTo(endOfStep1, {duration: undefined, ease: \"none\"});\n    } else {\n      tl.pause(tl.labels[labels[idx-1]]);\n    }\n  } else {\n    showSlide(cur-1, -1);\n  }\n}\n\nfunction runSlideAnimation(idx){\n  if (ionoIonInterval) { clearInterval(ionoIonInterval); ionoIonInterval = null; }\n  if (!ANIMATORS[idx]) return;\n  const tl = ANIMATORS[idx]();\n  if (tl && tl.labels){\n    slideTimelines[idx] = tl;\n    const labels = getStepLabels(tl);\n    slideSteps[idx] = labels;\n    slideStepIdx[idx] = 0;\n    // Auto-play step 1 on entry: tween from start to the END of step1 (= start of step2, or end of timeline)\n    if (labels.length){\n      const endOfStep1 = labels.length > 1 ? labels[1] : tl.duration();\n      tl.pause(0);\n      tl.tweenTo(endOfStep1, {duration: undefined, ease: \"none\"});\n    }\n  }\n}\n\n/* ============== Init ============== */\nslides[0].classList.add('active');\nrunSlideAnimation(0);\ntry { window.parent && window.parent.postMessage({slideIndexChanged: 0}, '*'); } catch(e){}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
