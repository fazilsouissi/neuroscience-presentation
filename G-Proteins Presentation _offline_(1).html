  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {

      }

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

        s.textContent = await r.text();
        s.removeAttribute('src');

      old.replaceWith(s);
      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }

    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>G-Proteins and Their Role in Cellular Signal Transduction<\u002Ftitle>\n\n\n<style>\n  :root{\n    --bg:#f6f5f0;\n    --panel:#ffffff;\n    --ink:#1c2620;\n    --muted:#5d6b62;\n    --hair:#d8d6cc;\n    --green:#2d5a3d;\n    --green-2:#3d7a52;\n    --green-soft:#e6efe8;\n    --accent-blue:#2c5d87;\n    --accent-red:#b45341;\n    --accent-orange:#c97a3a;\n    --accent-amber:#caa24a;\n    --note:#3a4640;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);\n    font-family: \"Inter\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Helvetica, Arial, sans-serif;\n    font-feature-settings:\"ss01\",\"cv11\";\n    -webkit-font-smoothing:antialiased;\n    overflow:hidden;\n  }\n  /* Stage scales the 1280x800 canvas to viewport */\n  #stage{\n    position:fixed; inset:0;\n    background:#0e1410;\n    overflow:hidden;\n  }\n  .canvas{\n    position:absolute;\n    left:0; top:0;\n    width:1280px; height:800px;\n    background:var(--bg);\n    box-shadow: 0 30px 80px rgba(0,0,0,.35);\n    overflow:hidden;\n    transform-origin: 0 0;\n  }\n  /* slides */\n  .slide{\n    position:absolute; inset:0;\n    padding:56px 72px 0 72px;\n    display:flex; flex-direction:column;\n    opacity:0; pointer-events:none;\n  }\n  body:not(.notes-off) .slide{padding-bottom:170px}\n  .slide.active{opacity:1; pointer-events:auto}\n  .slide h1, .slide h2{font-weight:600; letter-spacing:-0.01em; color:var(--green); margin:0}\n  .slide h1{font-size:52px; line-height:1.05}\n  .slide h2{font-size:34px; line-height:1.1}\n  .slide p, .slide li{font-size:18px; line-height:1.45; color:var(--ink)}\n  .eyebrow{\n    font-size:12px; letter-spacing:.18em; text-transform:uppercase;\n    color:var(--green-2); font-weight:600; margin-bottom:14px;\n  }\n  /* chrome */\n  .chrome{\n    position:fixed; left:0; right:0; bottom:0; padding:14px 22px;\n    display:flex; align-items:center; justify-content:space-between;\n    color:#cbd2cd; font-size:12px; letter-spacing:.12em; text-transform:uppercase;\n    pointer-events:none; z-index:10;\n  }\n  .chrome .title{opacity:.55}\n  .nav{\n    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);\n    display:flex; gap:10px; align-items:center; z-index:11;\n    background:rgba(20,28,22,.7); backdrop-filter:blur(8px);\n    border:1px solid rgba(255,255,255,.06);\n    border-radius:999px; padding:6px 10px; pointer-events:auto;\n  }\n  .nav button{\n    appearance:none; border:0; background:transparent; color:#e6efe8;\n    width:30px; height:30px; border-radius:999px; cursor:pointer;\n    display:grid; place-items:center; transition:background .15s;\n  }\n  .nav button:hover{background:rgba(255,255,255,.08)}\n  .nav .count{font-variant-numeric:tabular-nums; font-size:12px; padding:0 10px; color:#cbd2cd}\n  /* Speaker notes at bottom of every slide (inside canvas) */\n  .notes{\n    position:absolute; left:0; right:0; bottom:0;\n    padding:16px 72px 22px;\n    background:linear-gradient(to top, rgba(28,38,32,.04), rgba(28,38,32,0));\n    border-top:1px solid var(--hair);\n    color:var(--note); font-size:12.5px; line-height:1.55;\n    max-height:160px; overflow:hidden;\n  }\n  .notes .label{\n    font-size:10px; letter-spacing:.18em; text-transform:uppercase;\n    color:var(--green-2); font-weight:600; margin-bottom:6px;\n    display:flex; align-items:center; gap:8px;\n  }\n  .notes .label::before{\n    content:\"\"; width:6px; height:6px; border-radius:50%; background:var(--green);\n  }\n  .notes.hidden{display:none}\n  .notes-toggle{display:none}\n  /* Layout helpers */\n  .row{display:flex; gap:32px}\n  .col{display:flex; flex-direction:column}\n  .grow{flex:1}\n  .card{\n    background:var(--panel); border:1px solid var(--hair); border-radius:14px;\n    padding:22px;\n  }\n  /* ====== SLIDE 1 ====== */\n  .s1{justify-content:center; align-items:center; text-align:center; padding-top:0}\n  .s1 .kicker{font-size:13px; letter-spacing:.24em; text-transform:uppercase; color:var(--green-2); font-weight:600}\n  .s1 h1{font-size:72px; line-height:1.02; margin-top:18px; max-width:1000px}\n  .s1 .question{\n    margin-top:36px; font-size:24px; color:var(--ink); position:relative; display:inline-block;\n    padding:8px 14px; line-height:1.3;\n  }\n  .s1 .question .highlight{\n    position:absolute; left:0; top:8px; bottom:8px; width:0; background:#cfe1d4;\n    z-index:-1; border-radius:3px;\n  }\n  .s1 .subtitle{margin-top:36px; font-size:20px; color:var(--muted); max-width:880px; line-height:1.5}\n  .s1 .subtitle .ch{display:inline-block; opacity:0}\n  .s1 .meta{margin-top:60px; font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted)}\n  .s1 .rule{width:60px; height:1px; background:var(--green); margin:24px auto 0; opacity:0}\n  /* ====== SLIDE 2 ====== */\n  .s2 .grid{display:grid; grid-template-columns: 1.15fr 1fr; gap:36px; flex:1; padding-top:24px}\n  .synapse{\n    background:var(--panel); border:1px solid var(--hair); border-radius:14px;\n    position:relative; overflow:hidden;\n  }\n  .flowchart{display:flex; flex-direction:column; gap:14px; padding-top:8px}\n  .flow-step{\n    background:var(--panel); border:1px solid var(--hair); border-radius:10px;\n    padding:14px 18px; display:flex; align-items:center; gap:14px; opacity:0;\n  }\n  .flow-step .num{\n    width:28px; height:28px; border-radius:50%; background:var(--green-soft);\n    color:var(--green); font-weight:700; font-size:13px;\n    display:grid; place-items:center; flex-shrink:0;\n  }\n  .flow-step .label{font-weight:600; color:var(--ink); font-size:16px}\n  .flow-step .sub{color:var(--muted); font-size:13px; margin-top:2px}\n  .flow-arrow{height:18px; display:grid; place-items:center; opacity:0}\n  /* ====== SLIDE 3 ====== */\n  .s3 .panels{display:grid; grid-template-columns:1fr 1fr; gap:24px; flex:1; padding-top:12px}\n  .panel{\n    background:var(--panel); border:1px solid var(--hair); border-radius:14px;\n    padding:18px 20px; display:flex; flex-direction:column; gap:10px; position:relative;\n  }\n  .panel .ptype{font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--green-2); font-weight:600}\n  .panel h3{margin:0; font-size:26px; color:var(--green); font-weight:600}\n  .panel .speed{\n    font-size:14px; color:var(--ink); font-weight:600;\n    padding:8px 12px; border-radius:6px; background:var(--green-soft); width:max-content;\n    opacity:0;\n  }\n  .insight{\n    margin-top:12px; padding:10px 18px; border-left:3px solid var(--green);\n    color:var(--ink); font-size:16px; opacity:0; background:rgba(45,90,61,.04);\n  }\n  /* ====== SLIDE 4 ====== */\n  .s4 .layout{display:grid; grid-template-columns: 1.1fr .9fr; gap:32px; flex:1; padding-top:18px}\n  .s4 .right{display:flex; flex-direction:column; gap:18px}\n  .s4 .equation{\n    background:var(--panel); border:1px solid var(--hair); border-radius:12px;\n    padding:18px 20px; font-size:16px; color:var(--ink); line-height:1.7;\n  }\n  .s4 .equation .word{display:inline-block; opacity:0; margin-right:6px}\n  .s4 .equation .arrow{color:var(--green-2); margin:0 4px}\n  .s4 .delegation{\n    background:linear-gradient(135deg, var(--green) 0%, var(--green-2) 100%);\n    color:#f6f5f0; border-radius:14px; padding:28px;\n    display:flex; flex-direction:column; align-items:center; justify-content:center;\n    text-align:center; min-height:160px;\n  }\n  .s4 .delegation .lbl{font-size:11px; letter-spacing:.24em; text-transform:uppercase; opacity:.7}\n  .s4 .delegation .word{font-size:46px; font-weight:700; letter-spacing:-0.02em; margin-top:6px}\n  .s4 .delegation .desc{margin-top:8px; font-size:13px; opacity:.85; max-width:280px}\n  /* ====== SLIDE 5 ====== */\n  .s5 .layout{display:grid; grid-template-columns: 1fr 320px; gap:32px; flex:1; padding-top:18px}\n  .s5 .cycle-card{\n    background:var(--panel); border:1px solid var(--hair); border-radius:14px; position:relative;\n  }\n  .state-list{display:flex; flex-direction:column; gap:14px}\n  .state{\n    background:var(--panel); border:1px solid var(--hair); border-radius:10px;\n    padding:14px 16px; opacity:0;\n  }\n  .state .tag{font-size:11px; letter-spacing:.18em; text-transform:uppercase; font-weight:700}\n  .state .tag.off{color:var(--muted)}\n  .state .tag.on{color:var(--green)}\n  .state .desc{font-size:14px; color:var(--ink); margin-top:6px; line-height:1.4}\n  .s5 .insight{margin-top:14px}\n  /* ====== SLIDE 6 ====== */\n  .s6 .columns{display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; flex:1; padding-top:14px}\n  .pcol{\n    background:var(--panel); border:1px solid var(--hair); border-radius:14px;\n    padding:18px; display:flex; flex-direction:column; gap:8px; opacity:0;\n  }\n  .pcol .header{\n    display:flex; align-items:center; gap:10px; padding-bottom:10px; border-bottom:1px solid var(--hair);\n    margin-bottom:6px;\n  }\n  .pcol .dot{width:10px; height:10px; border-radius:50%}\n  .pcol .name{font-weight:700; font-size:18px}\n  .pcol .step{\n    font-size:13px; color:var(--ink); padding:8px 10px; border-radius:6px;\n    background:#fafaf6; border:1px solid var(--hair);\n    display:flex; align-items:center; gap:8px;\n  }\n  .pcol .step .k{font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:600}\n  .pcol .step .v{font-weight:600}\n  .pcol .arrow{height:10px; display:grid; place-items:center; color:var(--muted)}\n  .pcol .outcome{\n    margin-top:auto; padding:10px 12px; border-radius:8px; font-size:13px; font-weight:600; color:#fff;\n  }\n  .pcol.gs .outcome{background:var(--accent-blue)}\n  .pcol.gi .outcome{background:var(--accent-red)}\n  .pcol.gq .outcome{background:#3d7a52}\n  .pcol.gs .dot{background:var(--accent-blue)}\n  .pcol.gi .dot{background:var(--accent-red)}\n  .pcol.gq .dot{background:#3d7a52}\n  .s6 .footer-line{\n    text-align:center; margin-top:14px; font-size:18px; color:var(--green); font-weight:500;\n    opacity:0;\n  }\n  /* ====== SLIDE 7 ====== */\n  .s7 .why{display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; padding-top:16px}\n  .why-card{\n    background:var(--panel); border:1px solid var(--hair); border-radius:14px;\n    padding:20px; display:flex; flex-direction:column; gap:12px; opacity:0; min-height:260px;\n  }\n  .why-card .label{font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--green-2); font-weight:700}\n  .why-card .name{font-size:24px; font-weight:700; color:var(--green); letter-spacing:-0.01em}\n  .why-card .desc{font-size:13px; color:var(--muted); line-height:1.45}\n  .why-card .visual{flex:1; min-height:110px; display:grid; place-items:center}\n  .why-card .counter{font-size:36px; font-weight:700; color:var(--green); font-variant-numeric:tabular-nums}\n  .s7 .closing{\n    margin-top:22px; text-align:center; position:relative; padding:16px 0;\n  }\n  .s7 .closing .echo{\n    position:absolute; inset:0; display:grid; place-items:center;\n    color:var(--green); font-size:22px; opacity:0; pointer-events:none;\n    font-style:italic; max-width:900px; margin:0 auto;\n  }\n  .s7 .closing .lines{position:relative; z-index:1; opacity:0}\n  .s7 .closing .lines .line{font-size:22px; color:var(--ink); line-height:1.45}\n  .s7 .closing .lines .line + .line{margin-top:6px}\n  .s7 .closing .lines em{color:var(--green); font-style:normal; font-weight:600}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"stage\">\n  <div class=\"canvas\" id=\"canvas\">\n\n    <!-- SLIDE 1 -->\n    <section class=\"slide s1\" data-slide=\"1\">\n      <div class=\"kicker\">Lecture · Cellular Neuroscience<\u002Fdiv>\n      <h1>G-Proteins and Their Role in Cellular Signal Transduction<\u002Fh1>\n      <div class=\"question\" id=\"s1-question\">\n        <span class=\"highlight\"><\u002Fspan>\n        How do G-proteins convert receptor activation into a cellular response?\n      <\u002Fdiv>\n      <div class=\"subtitle\" id=\"s1-sub\"><\u002Fdiv>\n      <div class=\"rule\" id=\"s1-rule\"><\u002Fdiv>\n      <div class=\"meta\">Based on Purves, <em>Neuroscience<\u002Fem> · Chapter on Signal Transduction<\u002Fdiv>\n      <div class=\"notes\">\n        <button class=\"notes-toggle\" data-notes-toggle=\"\">Hide notes<\u002Fbutton>\n        <div class=\"label\">Speaker notes<\u002Fdiv>\n        <div class=\"body\">Today we're going to answer one central question: how do G-proteins convert receptor activation into a cellular response? To understand why this question matters, you need to picture one basic problem: cells are separated from the outside world by a membrane. When a chemical signal arrives from outside, the cell needs machinery to detect it and translate it into something meaningful on the inside. G-proteins are one of the key tools evolution found to solve this problem. And here's the most important thing to understand from the start: G-proteins are not the neurotransmitter, and they are not the final cellular effect. They are the coupling machinery in between.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SLIDE 2 -->\n    <section class=\"slide s2\" data-slide=\"2\">\n      <div class=\"eyebrow\">02 · Where the story begins<\u002Fdiv>\n      <h2>From synaptic communication to postsynaptic receptors<\u002Fh2>\n      <div class=\"grid\">\n        <div class=\"synapse\">\n          <svg id=\"synapse-svg\" viewBox=\"0 0 600 520\" width=\"100%\" height=\"100%\" preserveAspectRatio=\"xMidYMid meet\">\n            <defs>\n              <radialGradient id=\"terminalGrad\" cx=\"50%\" cy=\"38%\" r=\"65%\">\n                <stop offset=\"0%\" stop-color=\"#f4cdb3\"><\u002Fstop>\n                <stop offset=\"70%\" stop-color=\"#e8a17a\"><\u002Fstop>\n                <stop offset=\"100%\" stop-color=\"#c97a5a\"><\u002Fstop>\n              <\u002FradialGradient>\n              <linearGradient id=\"postGrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#f8e89a\"><\u002Fstop>\n                <stop offset=\"100%\" stop-color=\"#e8c95a\"><\u002Fstop>\n              <\u002FlinearGradient>\n              <radialGradient id=\"vesicleGrad\" cx=\"40%\" cy=\"38%\" r=\"60%\">\n                <stop offset=\"0%\" stop-color=\"#a3c8e6\"><\u002Fstop>\n                <stop offset=\"100%\" stop-color=\"#5a8fb8\"><\u002Fstop>\n              <\u002FradialGradient>\n              <radialGradient id=\"haloGrad\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n                <stop offset=\"0%\" stop-color=\"#ffe27a\" stop-opacity=\"0.95\"><\u002Fstop>\n                <stop offset=\"60%\" stop-color=\"#ffd14a\" stop-opacity=\"0.6\"><\u002Fstop>\n                <stop offset=\"100%\" stop-color=\"#ffd14a\" stop-opacity=\"0\"><\u002Fstop>\n              <\u002FradialGradient>\n              <linearGradient id=\"bgSky\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#f1f7fb\"><\u002Fstop>\n                <stop offset=\"100%\" stop-color=\"#e8f0f5\"><\u002Fstop>\n              <\u002FlinearGradient>\n            <\u002Fdefs>\n            <!-- background -->\n            <rect x=\"0\" y=\"0\" width=\"600\" height=\"520\" fill=\"url(#bgSky)\"><\u002Frect>\n\n            <!-- Presynaptic neuron (teardrop bulb on stalk) -->\n            <g id=\"pre-group\" opacity=\"0\">\n              <!-- outer outline (lighter) -->\n              <path d=\"M 230 0 L 230 80\n                       C 150 110 100 180 110 260\n                       C 120 330 200 360 300 360\n                       C 400 360 480 330 490 260\n                       C 500 180 450 110 370 80\n                       L 370 0 Z\" fill=\"url(#terminalGrad)\" stroke=\"#a85a3a\" stroke-width=\"2\"><\u002Fpath>\n              <!-- inner membrane line -->\n              <path d=\"M 245 30\n                       C 165 90 122 175 132 255\n                       C 142 318 210 345 300 345\n                       C 390 345 458 318 468 255\n                       C 478 175 435 90 355 30\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" opacity=\"0.55\"><\u002Fpath>\n            <\u002Fg>\n\n            <!-- Vesicles inside terminal -->\n            <g id=\"vesicles\" opacity=\"0\">\n              <g class=\"ves\" transform=\"translate(195,170)\"><circle r=\"20\" fill=\"url(#vesicleGrad)\" stroke=\"#3a6f95\" stroke-width=\"1\"><\u002Fcircle><circle cx=\"-5\" cy=\"-3\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><circle cx=\"6\" cy=\"2\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><circle cx=\"-2\" cy=\"6\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><\u002Fg>\n              <g class=\"ves\" transform=\"translate(265,150)\"><circle r=\"20\" fill=\"url(#vesicleGrad)\" stroke=\"#3a6f95\" stroke-width=\"1\"><\u002Fcircle><circle cx=\"-5\" cy=\"-3\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><circle cx=\"6\" cy=\"2\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><circle cx=\"-2\" cy=\"6\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><\u002Fg>\n              <g class=\"ves\" transform=\"translate(345,158)\"><circle r=\"20\" fill=\"url(#vesicleGrad)\" stroke=\"#3a6f95\" stroke-width=\"1\"><\u002Fcircle><circle cx=\"-5\" cy=\"-3\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><circle cx=\"6\" cy=\"2\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><circle cx=\"-2\" cy=\"6\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><\u002Fg>\n              <g class=\"ves\" transform=\"translate(415,180)\"><circle r=\"20\" fill=\"url(#vesicleGrad)\" stroke=\"#3a6f95\" stroke-width=\"1\"><\u002Fcircle><circle cx=\"-5\" cy=\"-3\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><circle cx=\"6\" cy=\"2\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><circle cx=\"-2\" cy=\"6\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><\u002Fg>\n              <g class=\"ves\" transform=\"translate(225,235)\"><circle r=\"20\" fill=\"url(#vesicleGrad)\" stroke=\"#3a6f95\" stroke-width=\"1\"><\u002Fcircle><circle cx=\"-5\" cy=\"-3\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><circle cx=\"6\" cy=\"2\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><circle cx=\"-2\" cy=\"6\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><\u002Fg>\n              <g class=\"ves\" transform=\"translate(305,228)\"><circle r=\"20\" fill=\"url(#vesicleGrad)\" stroke=\"#3a6f95\" stroke-width=\"1\"><\u002Fcircle><circle cx=\"-5\" cy=\"-3\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><circle cx=\"6\" cy=\"2\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><circle cx=\"-2\" cy=\"6\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><\u002Fg>\n              <g class=\"ves\" transform=\"translate(385,238)\"><circle r=\"20\" fill=\"url(#vesicleGrad)\" stroke=\"#3a6f95\" stroke-width=\"1\"><\u002Fcircle><circle cx=\"-5\" cy=\"-3\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><circle cx=\"6\" cy=\"2\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><circle cx=\"-2\" cy=\"6\" r=\"3\" fill=\"#1a4769\"><\u002Fcircle><\u002Fg>\n              <!-- docked vesicles at base -->\n              <g class=\"ves docked\" transform=\"translate(245,305)\"><circle r=\"18\" fill=\"url(#vesicleGrad)\" stroke=\"#3a6f95\" stroke-width=\"1\"><\u002Fcircle><\u002Fg>\n              <g class=\"ves docked\" transform=\"translate(310,305)\"><circle r=\"18\" fill=\"url(#vesicleGrad)\" stroke=\"#3a6f95\" stroke-width=\"1\"><\u002Fcircle><\u002Fg>\n              <g class=\"ves docked\" transform=\"translate(370,305)\"><circle r=\"18\" fill=\"url(#vesicleGrad)\" stroke=\"#3a6f95\" stroke-width=\"1\"><\u002Fcircle><\u002Fg>\n            <\u002Fg>\n\n            <!-- Synaptic cleft label -->\n            <text x=\"540\" y=\"372\" text-anchor=\"end\" font-size=\"11\" fill=\"#5d6b62\" id=\"cleft-label\" opacity=\"0\" letter-spacing=\"2\" font-weight=\"600\">SYNAPTIC CLEFT<\u002Ftext>\n\n            <!-- Postsynaptic membrane (yellow band with green ridge on top) -->\n            <g id=\"post-group\" opacity=\"0\">\n              <!-- top ridge: green band shaped to receive terminal -->\n              <path d=\"M 0 380\n                       C 80 360 140 358 200 372\n                       C 240 382 270 380 300 378\n                       C 330 376 360 380 400 372\n                       C 460 358 520 360 600 380\n                       L 600 410 L 0 410 Z\" fill=\"#9fc78a\" stroke=\"#5a8a45\" stroke-width=\"1.5\"><\u002Fpath>\n              <!-- yellow body -->\n              <path d=\"M 0 408 L 600 408 L 600 520 L 0 520 Z\" fill=\"url(#postGrad)\" stroke=\"#c9a13a\" stroke-width=\"1.5\"><\u002Fpath>\n            <\u002Fg>\n\n            <!-- Receptors embedded in membrane (T-shape pegs) -->\n            <g id=\"receptors\">\n              <g class=\"rcpt\" transform=\"translate(245,395)\">\n                <rect x=\"-9\" y=\"-12\" width=\"18\" height=\"34\" rx=\"3\" fill=\"#7a5fa8\" stroke=\"#3a2570\" stroke-width=\"1.5\"><\u002Frect>\n                <rect x=\"-14\" y=\"-16\" width=\"28\" height=\"10\" rx=\"3\" fill=\"#9a7fc8\" stroke=\"#3a2570\" stroke-width=\"1.5\"><\u002Frect>\n              <\u002Fg>\n              <g class=\"rcpt\" transform=\"translate(310,395)\">\n                <rect x=\"-9\" y=\"-12\" width=\"18\" height=\"34\" rx=\"3\" fill=\"#7a5fa8\" stroke=\"#3a2570\" stroke-width=\"1.5\"><\u002Frect>\n                <rect x=\"-14\" y=\"-16\" width=\"28\" height=\"10\" rx=\"3\" fill=\"#9a7fc8\" stroke=\"#3a2570\" stroke-width=\"1.5\"><\u002Frect>\n              <\u002Fg>\n              <g class=\"rcpt\" transform=\"translate(370,395)\">\n                <rect x=\"-9\" y=\"-12\" width=\"18\" height=\"34\" rx=\"3\" fill=\"#7a5fa8\" stroke=\"#3a2570\" stroke-width=\"1.5\"><\u002Frect>\n                <rect x=\"-14\" y=\"-16\" width=\"28\" height=\"10\" rx=\"3\" fill=\"#9a7fc8\" stroke=\"#3a2570\" stroke-width=\"1.5\"><\u002Frect>\n              <\u002Fg>\n            <\u002Fg>\n\n            <!-- Receptor activation halos -->\n            <g id=\"halos\">\n              <circle class=\"halo\" cx=\"245\" cy=\"395\" r=\"0\" fill=\"url(#haloGrad)\"><\u002Fcircle>\n              <circle class=\"halo\" cx=\"310\" cy=\"395\" r=\"0\" fill=\"url(#haloGrad)\"><\u002Fcircle>\n              <circle class=\"halo\" cx=\"370\" cy=\"395\" r=\"0\" fill=\"url(#haloGrad)\"><\u002Fcircle>\n            <\u002Fg>\n\n            <!-- Neurotransmitter dots (small blue) released into cleft -->\n            <g id=\"nt-dots\"><\u002Fg>\n\n            <!-- Effector molecules (red dots emerging from inside cell) -->\n            <g id=\"effectors\">\n              <circle class=\"eff\" cx=\"245\" cy=\"455\" r=\"0\" fill=\"#d44a3a\" stroke=\"#7a2515\" stroke-width=\"0.8\"><\u002Fcircle>\n              <circle class=\"eff\" cx=\"310\" cy=\"465\" r=\"0\" fill=\"#d44a3a\" stroke=\"#7a2515\" stroke-width=\"0.8\"><\u002Fcircle>\n              <circle class=\"eff\" cx=\"395\" cy=\"450\" r=\"0\" fill=\"#d44a3a\" stroke=\"#7a2515\" stroke-width=\"0.8\"><\u002Fcircle>\n              <circle class=\"eff\" cx=\"425\" cy=\"478\" r=\"0\" fill=\"#d44a3a\" stroke=\"#7a2515\" stroke-width=\"0.8\"><\u002Fcircle>\n            <\u002Fg>\n\n            <!-- Callout labels -->\n            <g id=\"callouts\" font-family=\"Inter, sans-serif\">\n              <!-- presynaptic neuron -->\n              <g id=\"co-pre\" opacity=\"0\">\n                <line x1=\"300\" y1=\"180\" x2=\"500\" y2=\"60\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Fline>\n                <circle cx=\"300\" cy=\"180\" r=\"2.5\" fill=\"#3a4640\"><\u002Fcircle>\n                <rect x=\"500\" y=\"44\" width=\"98\" height=\"32\" rx=\"4\" fill=\"#fff\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Frect>\n                <text x=\"549\" y=\"58\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#1c2620\">Presynaptic<\u002Ftext>\n                <text x=\"549\" y=\"71\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#1c2620\">neuron<\u002Ftext>\n              <\u002Fg>\n              <!-- neurotransmitter -->\n              <g id=\"co-nt\" opacity=\"0\">\n                <line x1=\"295\" y1=\"365\" x2=\"500\" y2=\"180\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Fline>\n                <rect x=\"496\" y=\"166\" width=\"100\" height=\"22\" rx=\"4\" fill=\"#fff\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Frect>\n                <text x=\"546\" y=\"181\" text-anchor=\"middle\" font-size=\"11\" fill=\"#1c2620\">Neurotransmitter<\u002Ftext>\n              <\u002Fg>\n              <!-- synaptic cleft -->\n              <g id=\"co-cleft\" opacity=\"0\">\n                <line x1=\"540\" y1=\"270\" x2=\"350\" y2=\"378\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Fline>\n                <rect x=\"496\" y=\"256\" width=\"100\" height=\"22\" rx=\"4\" fill=\"#fff\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Frect>\n                <text x=\"546\" y=\"271\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"#1c2620\">Synaptic cleft<\u002Ftext>\n              <\u002Fg>\n              <!-- postsynaptic membrane -->\n              <g id=\"co-post\" opacity=\"0\">\n                <line x1=\"540\" y1=\"358\" x2=\"500\" y2=\"395\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Fline>\n                <rect x=\"476\" y=\"344\" width=\"120\" height=\"22\" rx=\"4\" fill=\"#fff\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Frect>\n                <text x=\"536\" y=\"359\" text-anchor=\"middle\" font-size=\"11\" fill=\"#1c2620\">Postsynaptic membrane<\u002Ftext>\n              <\u002Fg>\n              <!-- receptor → effector -->\n              <g id=\"co-rcpt\" opacity=\"0\">\n                <line x1=\"540\" y1=\"438\" x2=\"425\" y2=\"478\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Fline>\n                <rect x=\"476\" y=\"424\" width=\"120\" height=\"22\" rx=\"4\" fill=\"#fff\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Frect>\n                <text x=\"536\" y=\"439\" text-anchor=\"middle\" font-size=\"11\" fill=\"#1c2620\">Receptor → effector<\u002Ftext>\n              <\u002Fg>\n            <\u002Fg>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"flowchart\">\n          <div class=\"flow-step\" data-step=\"1\"><div class=\"num\">1<\u002Fdiv><div><div class=\"label\">Signaling cell<\u002Fdiv><div class=\"sub\">Releases molecular signal<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"flow-arrow\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\"><path d=\"M7 1 V13 M3 9 L7 13 L11 9\" stroke=\"#3d7a52\" stroke-width=\"1.5\" fill=\"none\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"flow-step\" data-step=\"2\"><div class=\"num\">2<\u002Fdiv><div><div class=\"label\">Signal<\u002Fdiv><div class=\"sub\">Neurotransmitter, hormone<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"flow-arrow\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\"><path d=\"M7 1 V13 M3 9 L7 13 L11 9\" stroke=\"#3d7a52\" stroke-width=\"1.5\" fill=\"none\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"flow-step\" data-step=\"3\"><div class=\"num\">3<\u002Fdiv><div><div class=\"label\">Receptor<\u002Fdiv><div class=\"sub\">Transduces the signal<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"flow-arrow\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\"><path d=\"M7 1 V13 M3 9 L7 13 L11 9\" stroke=\"#3d7a52\" stroke-width=\"1.5\" fill=\"none\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"flow-step\" data-step=\"4\"><div class=\"num\">4<\u002Fdiv><div><div class=\"label\">Effector molecule<\u002Fdiv><div class=\"sub\">Enzyme, channel, kinase<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"flow-arrow\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\"><path d=\"M7 1 V13 M3 9 L7 13 L11 9\" stroke=\"#3d7a52\" stroke-width=\"1.5\" fill=\"none\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"flow-step\" data-step=\"5\"><div class=\"num\">5<\u002Fdiv><div><div class=\"label\">Cellular response<\u002Fdiv><div class=\"sub\">Electrical · biochemical · genetic<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"notes\">\n        <button class=\"notes-toggle\" data-notes-toggle=\"\">Hide notes<\u002Fbutton>\n        <div class=\"label\">Speaker notes<\u002Fdiv>\n        <div class=\"body\">Let's start at the synapse, which you already know from class. A presynaptic neuron releases neurotransmitters into the synaptic cleft. Those neurotransmitters diffuse across and bind to receptor proteins embedded in the postsynaptic membrane. This binding is where everything we're going to talk about today begins. Purves describes this as a three-component system: a molecular signal that carries information, a receptor that transduces it, and an effector molecule that produces the actual cellular response. Our topic starts at a very precise location: the postsynaptic receptor. The question is not how the signal travels across the cleft — it's what happens after it arrives. That conversion is called signal transduction, and G-proteins are central to it.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SLIDE 3 -->\n    <section class=\"slide s3\" data-slide=\"3\">\n      <div class=\"eyebrow\">03 · Two architectures<\u002Fdiv>\n      <h2>Two classes of postsynaptic receptors<\u002Fh2>\n      <div class=\"panels\">\n        <div class=\"panel\" id=\"panel-iono\">\n          <div class=\"ptype\">Class I<\u002Fdiv>\n          <h3>Ionotropic<\u002Fh3>\n          <svg id=\"iono-svg\" viewBox=\"0 0 600 360\" width=\"100%\" height=\"240\" preserveAspectRatio=\"xMidYMid meet\">\n            <defs>\n              <linearGradient id=\"iono-sky\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#dceaf2\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#c8dde8\"><\u002Fstop>\n              <\u002FlinearGradient>\n              <linearGradient id=\"iono-cyto\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#f5e2bd\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#ead2a0\"><\u002Fstop>\n              <\u002FlinearGradient>\n              <linearGradient id=\"iono-channel-grad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#c9a8e0\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#7a5fa8\"><\u002Fstop>\n              <\u002FlinearGradient>\n            <\u002Fdefs>\n            <!-- outside cell (sky) -->\n            <rect x=\"0\" y=\"0\" width=\"600\" height=\"155\" fill=\"url(#iono-sky)\"><\u002Frect>\n            <!-- cytoplasm -->\n            <rect x=\"0\" y=\"195\" width=\"600\" height=\"165\" fill=\"url(#iono-cyto)\"><\u002Frect>\n            <!-- lipid bilayer (two rows of heads + tails) -->\n            <g id=\"iono-bilayer\">\n              <!-- upper heads -->\n              <g fill=\"#d49c4a\" stroke=\"#a8722a\" stroke-width=\"0.6\">\n                <g id=\"iono-heads-top\"><\u002Fg>\n              <\u002Fg>\n              <!-- lower heads -->\n              <g fill=\"#d49c4a\" stroke=\"#a8722a\" stroke-width=\"0.6\">\n                <g id=\"iono-heads-bot\"><\u002Fg>\n              <\u002Fg>\n            <\u002Fg>\n            <!-- text labels for cell sides -->\n            <text x=\"585\" y=\"148\" text-anchor=\"end\" font-size=\"11\" fill=\"#3a4640\" font-style=\"italic\">Outside cell<\u002Ftext>\n            <text x=\"585\" y=\"218\" text-anchor=\"end\" font-size=\"11\" fill=\"#3a4640\" font-style=\"italic\">Inside cell<\u002Ftext>\n\n            <!-- LEFT channel: closed -->\n            <g id=\"iono-left\">\n              <!-- channel walls (two halves with V-shape gap at top) -->\n              <path d=\"M 130 110 L 130 200 L 150 220 L 150 130 Z\" fill=\"url(#iono-channel-grad)\" stroke=\"#3a2570\" stroke-width=\"1.2\"><\u002Fpath>\n              <path d=\"M 200 110 L 200 200 L 180 220 L 180 130 Z\" fill=\"url(#iono-channel-grad)\" stroke=\"#3a2570\" stroke-width=\"1.2\"><\u002Fpath>\n              <!-- inner closed body -->\n              <path d=\"M 150 130 L 150 220 L 165 230 L 1               <g id=\"iono-cb2\">\n                <rect x=\"490\" y=\"100\" width=\"105\" height=\"34\" rx=\"4\" fill=\"#fff\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Frect>\n                <circle cx=\"501\" cy=\"117\" r=\"7\" fill=\"#1c2620\"><\u002Fcircle>\n                <text x=\"501\" y=\"121\" text-anchor=\"middle\" font-size=\"10\" fill=\"#fff\" font-weight=\"700\">2<\u002Ftext>\n                <text x=\"515\" y=\"114\" font-size=\"10\">Channel<\u002Ftext>\n                <text x=\"515\" y=\"127\" font-size=\"10\">opens.<\u002Ftext>\n                <line x1=\"490\" y1=\"125\" x2=\"465\" y2=\"135\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Fline>\n              <\u002Fg>\n              <g id=\"iono-cb3\">\n                <rect x=\"470\" y=\"290\" width=\"120\" height=\"34\" rx=\"4\" fill=\"#fff\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Frect>\n                <circle cx=\"481\" cy=\"307\" r=\"7\" fill=\"#1c2620\"><\u002Fcircle>\n                <text x=\"481\" y=\"311\" text-anchor=\"middle\" font-size=\"10\" fill=\"#fff\" font-weight=\"700\">3<\u002Ftext>\n                <text x=\"495\" y=\"304\" font-size=\"10\">Ions flow across<\u002Ftext>\n                <text x=\"495\" y=\"317\" font-size=\"10\">membrane.<\u002Ftext>\n                <line x1=\"470\" y1=\"307\" x2=\"445\" y2=\"297\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Fline>\n              <\u002Fg>\n            <\u002Fg>\n          <\u002Fsvg>\n          <div class=\"speed\">Direct · Fast · Channel opens<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"panel\" id=\"panel-meta\">\n          <div class=\"ptype\">Class II<\u002Fdiv>\n          <h3>Metabotropic<\u002Fh3>\n          <svg id=\"meta-svg\" viewBox=\"0 0 600 360\" width=\"100%\" height=\"240\" preserveAspectRatio=\"xMidYMid meet\">\n            <defs>\n              <linearGradient id=\"meta-sky\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#dceaf2\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#c8dde8\"><\u002Fstop>\n              <\u002FlinearGradient>\n              <linearGradient id=\"meta-cyto\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#f5e2bd\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#ead2a0\"><\u002Fstop>\n              <\u002FlinearGradient>\n              <linearGradient id=\"meta-rec\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#f0c89a\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#c89860\"><\u002Fstop>\n              <\u002FlinearGradient>\n              <linearGradient id=\"meta-gp\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#7ab0d8\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#3a78b8\"><\u002Fstop>\n              <\u002FlinearGradient>\n              <radialGradient id=\"meta-burst\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n                <stop offset=\"0%\" stop-color=\"#ffe27a\" stop-opacity=\"0.95\"><\u002Fstop>\n                <stop offset=\"60%\" stop-color=\"#ffd14a\" stop-opacity=\"0.7\"><\u002Fstop>\n                <stop offset=\"100%\" stop-color=\"#ffd14a\" stop-opacity=\"0\"><\u002Fstop>\n              <\u002FradialGradient>\n            <\u002Fdefs>\n            <rect x=\"0\" y=\"0\" width=\"600\" height=\"155\" fill=\"url(#meta-sky)\"><\u002Frect>\n            <rect x=\"0\" y=\"195\" width=\"600\" height=\"165\" fill=\"url(#meta-cyto)\"><\u002Frect>\n            <g id=\"meta-bilayer\">\n              <g fill=\"#d49c4a\" stroke=\"#a8722a\" stroke-width=\"0.6\"><g id=\"meta-heads-top\"><\u002Fg><\u002Fg>\n              <g fill=\"#d49c4a\" stroke=\"#a8722a\" stroke-width=\"0.6\"><g id=\"meta-heads-bot\"><\u002Fg><\u002Fg>\n            <\u002Fg>\n            <text x=\"290\" y=\"148\" text-anchor=\"middle\" font-size=\"11\" fill=\"#3a4640\" font-style=\"italic\" id=\"meta-receptor-label\">Receptor<\u002Ftext>\n\n            <!-- LEFT receptor: signal binding, G-protein detached -->\n            <g id=\"meta-left\">\n              <!-- receptor: U-shape opening upward -->\n              <path d=\"M 110 110 Q 110 100 120 100 L 145 100 Q 155 100 155 115 L 155 165 Q 155 175 145 175 L 175 175 Q 185 175 185 165 L 185 115 Q 185 100 195 100 L 220 100 Q 230 100 230 110 L 230 200 L 110 200 Z\" fill=\"url(#meta-rec)\" stroke=\"#8a5a25\" stroke-width=\"1.2\"><\u002Fpath>\n            <\u002Fg>\n            <!-- floating neurotransmitters -->\n            <circle id=\"meta-nt-far1\" cx=\"65\" cy=\"50\" r=\"9\" fill=\"#3d7a52\" stroke=\"#1f4a2d\" stroke-width=\"1\"><\u002Fcircle>\n            <circle id=\"meta-nt-far2\" cx=\"100\" cy=\"80\" r=\"9\" fill=\"#3d7a52\" stroke=\"#1f4a2d\" stroke-width=\"1\"><\u002Fcircle>\n            <circle id=\"meta-nt-binding\" cx=\"170\" cy=\"90\" r=\"9\" fill=\"#3d7a52\" stroke=\"#1f4a2d\" stroke-width=\"1\"><\u002Fcircle>\n\n            <!-- detached G-protein (left, below) -->\n            <g id=\"meta-gp-detached\">\n              <ellipse cx=\"240\" cy=\"265\" rx=\"22\" ry=\"14\" fill=\"url(#meta-gp)\" stroke=\"#1f4a6e\" stroke-width=\"1\" transform=\"rotate(-15 240 265)\"><\u002Fellipse>\n              <text x=\"232\" y=\"270\" font-size=\"10\" fill=\"#1c2620\" font-weight=\"700\" font-style=\"italic\">α<\u002Ftext>\n              <text x=\"250\" y=\"262\" font-size=\"9\" fill=\"#1c2620\" font-weight=\"700\" font-style=\"italic\">β<\u002Ftext>\n              <!-- arrow up to receptor -->\n              <path d=\"M 215 245 L 200 215\" stroke=\"#3a4640\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#meta-arrow-h)\"><\u002Fpath>\n            <\u002Fg>\n            <defs>\n              <marker id=\"meta-arrow-h\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto\">\n                <path d=\"M0 0 L10 5 L0 10 Z\" fill=\"#3a4640\"><\u002Fpath>\n              <\u002Fmarker>\n            <\u002Fdefs>\n\n            <!-- RIGHT receptor: bound + activated G-protein -->\n            <g id=\"meta-right\">\n              <path d=\"M 360 110 Q 360 100 370 100 L 395 100 Q 405 100 405 115 L 405 165 Q 405 175 395 175 L 425 175 Q 435 175 435 165 L 435 115 Q 435 100 445 100 L 470 100 Q 480 100 480 110 L 480 200 L 360 200 Z\" fill=\"url(#meta-rec)\" stroke=\"#8a5a25\" stroke-width=\"1.2\"><\u002Fpath>\n            <\u002Fg>\n            <!-- bound nt on top of right receptor -->\n            <circle id=\"meta-nt-bound\" cx=\"420\" cy=\"100\" r=\"9\" fill=\"#3d7a52\" stroke=\"#1f4a2d\" stroke-width=\"1\"><\u002Fcircle>\n            <!-- activated G-protein with starburst -->\n            <g id=\"meta-gp-active\">\n              <!-- starburst -->\n              <polygon id=\"meta-starburst\" points=\"420,200 432,222 458,218 442,240 458,262 432,258 420,280 408,258 382,262 398,240 382,218 408,222\" fill=\"url(#meta-burst)\" stroke=\"#e8a020\" stroke-width=\"0.8\" opacity=\"0\"><\u002Fpolygon>\n              <ellipse cx=\"420\" cy=\"240\" rx=\"22\" ry=\"14\" fill=\"url(#meta-gp)\" stroke=\"#1f4a6e\" stroke-width=\"1\"><\u002Fellipse>\n              <text x=\"412\" y=\"245\" font-size=\"10\" fill=\"#1c2620\" font-weight=\"700\" font-style=\"italic\">α<\u002Ftext>\n              <text x=\"430\" y=\"237\" font-size=\"9\" fill=\"#1c2620\" font-weight=\"700\" font-style=\"italic\">β<\u002Ftext>\n            <\u002Fg>\n            <text x=\"320\" y=\"225\" font-size=\"10\" fill=\"#1c2620\" font-style=\"italic\">G-protein<\u002Ftext>\n            <line x1=\"350\" y1=\"223\" x2=\"395\" y2=\"240\" stroke=\"#3a4640\" stroke-width=\"0.8\"><\u002Fline>\n\n            <!-- callouts -->\n            <g font-size=\"11\" fill=\"#1c2620\">\n              <g id=\"meta-cb1\">\n                <rect x=\"195\" y=\"20\" width=\"80\" height=\"34\" rx=\"4\" fill=\"#fff\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Frect>\n                <circle cx=\"206\" cy=\"37\" r=\"7\" fill=\"#1c2620\"><\u002Fcircle>\n                <text x=\"206\" y=\"41\" text-anchor=\"middle\" font-size=\"10\" fill=\"#fff\" font-weight=\"700\">1<\u002Ftext>\n                <text x=\"220\" y=\"34\" font-size=\"10\">Signal<\u002Ftext>\n                <text x=\"220\" y=\"47\" font-size=\"10\">binds.<\u002Ftext>\n                <line x1=\"205\" y1=\"55\" x2=\"175\" y2=\"80\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Fline>\n              <\u002Fg>\n              <g id=\"meta-cb2\">\n                <rect x=\"100\" y=\"295\" width=\"115\" height=\"34\" rx=\"4\" fill=\"#fff\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Frect>\n                <circle cx=\"111\" cy=\"312\" r=\"7\" fill=\"#1c2620\"><\u002Fcircle>\n                <text x=\"111\" y=\"316\" text-anchor=\"middle\" font-size=\"10\" fill=\"#fff\" font-weight=\"700\">2<\u002Ftext>\n                <text x=\"125\" y=\"309\" font-size=\"10\">G-protein<\u002Ftext>\n                <text x=\"125\" y=\"322\" font-size=\"10\">binds.<\u002Ftext>\n                <line x1=\"200\" y1=\"305\" x2=\"225\" y2=\"275\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Fline>\n              <\u002Fg>\n              <g id=\"meta-cb3\">\n                <rect x=\"470\" y=\"295\" width=\"115\" height=\"34\" rx=\"4\" fill=\"#fff\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Frect>\n                <circle cx=\"481\" cy=\"312\" r=\"7\" fill=\"#1c2620\"><\u002Fcircle>\n                <text x=\"481\" y=\"316\" text-anchor=\"middle\" font-size=\"10\" fill=\"#fff\" font-weight=\"700\">3<\u002Ftext>\n                <text x=\"495\" y=\"309\" font-size=\"10\">G-protein<\u002Ftext>\n                <text x=\"495\" y=\"322\" font-size=\"10\">activated.<\u002Ftext>\n                <line x1=\"470\" y1=\"305\" x2=\"445\" y2=\"265\" stroke=\"#3a4640\" stroke-width=\"1\"><\u002Fline>\n              <\u002Fg>\n            <\u002Fg>\n          <\u002Fsvg>\n          <div class=\"speed\">Indirect · Slower · Intracellular signaling<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"insight\" id=\"s3-insight\">Not just fast vs slow — different <em>types<\u002Fem> of response.<\u002Fdiv>\n      <div class=\"notes\">\n        <button class=\"notes-toggle\" data-notes-toggle=\"\">Hide notes<\u002Fbutton>\n        <div class=\"label\">Speaker notes<\u002Fdiv>\n        <div class=\"body\">Not all postsynaptic receptors work the same way. Purves distinguishes two fundamentally different classes. Ionotropic receptors have the receptor and the ion channel as part of the same protein complex. When the neurotransmitter binds, the channel opens directly, ions flow, and the membrane potential changes — fast and direct. Metabotropic receptors work differently. They don't open a channel directly; instead, they activate intracellular signaling molecules — the G-proteins — which then regulate effectors inside the cell. The deeper difference is not just fast versus slow: ionotropic receptors are useful when the cell needs a direct electrical response. Metabotropic receptors are useful when the cell needs a controlled intracellular cascade.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SLIDE 4 -->\n    <section class=\"slide s4\" data-slide=\"4\">\n      <div class=\"eyebrow\">04 · Mechanism<\u002Fdiv>\n      <h2>General mechanism of metabotropic signaling<\u002Fh2>\n      <div class=\"layout\">\n        <div class=\"card\" style=\"padding:14px\">\n          <svg id=\"mech-svg\" viewBox=\"0 0 760 460\" width=\"100%\" height=\"100%\" preserveAspectRatio=\"xMidYMid meet\">\n            <defs>\n              <linearGradient id=\"m4-sky\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#dceaf2\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#c8dde8\"><\u002Fstop>\n              <\u002FlinearGradient>\n              <linearGradient id=\"m4-cyto\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#f5e2bd\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#ead2a0\"><\u002Fstop>\n              <\u002FlinearGradient>\n              <linearGradient id=\"m4-rec\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#e0867a\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#b85042\"><\u002Fstop>\n              <\u002FlinearGradient>\n              <linearGradient id=\"m4-eff\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#d99a6e\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#a06642\"><\u002Fstop>\n              <\u002FlinearGradient>\n              <linearGradient id=\"m4-chan\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#c9a8e0\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#7a5fa8\"><\u002Fstop>\n              <\u002FlinearGradient>\n              <linearGradient id=\"m4-gp\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                <stop offset=\"0%\" stop-color=\"#7ab0d8\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#3a78b8\"><\u002Fstop>\n              <\u002FlinearGradient>\n              <radialGradient id=\"m4-burst\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n                <stop offset=\"0%\" stop-color=\"#ffe27a\" stop-opacity=\"0.95\"><\u002Fstop>\n                <stop offset=\"60%\" stop-color=\"#ffd14a\" stop-opacity=\"0.7\"><\u002Fstop>\n                <stop offset=\"100%\" stop-color=\"#ffd14a\" stop-opacity=\"0\"><\u002Fstop>\n              <\u002FradialGradient>\n              <marker id=\"m4-arrow-h\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"5\" markerHeight=\"5\" orient=\"auto\">\n                <path d=\"M0 0 L10 5 L0 10 Z\" fill=\"#3a4640\"><\u002Fpath>\n              <\u002Fmarker>\n            <\u002Fdefs>\n\n            <rect x=\"0\" y=\"0\" width=\"760\" height=\"180\" fill=\"url(#m4-sky)\"><\u002Frect>\n            <rect x=\"0\" y=\"220\" width=\"760\" height=\"240\" fill=\"url(#m4-cyto)\"><\u002Frect>\n\n            <!-- bilayer heads -->\n            <g fill=\"#d49c4a\" stroke=\"#a8722a\" stroke-width=\"0.6\"><g id=\"m4-heads-top\"><\u002Fg><\u002Fg>\n            <g fill=\"#d49c4a\" stroke=\"#a8722a\" stroke-width=\"0.6\"><g id=\"m4-heads-bot\"><\u002Fg><\u002Fg>\n\n            <!-- ===== RECEPTOR (left) ===== -->\n            <g id=\"m4-receptor\">\n              <!-- U-shape opening up -->\n              <path d=\"M 130 130 Q 130 115 145 115 L 175 115 Q 188 115 188 135 L 188 175 Q 188 188 175 188 L 205 188 Q 218 188 218 175 L 218 135 Q 218 115 231 115 L 261 115 Q 276 115 276 130 L 276 230 L 130 230 Z\" fill=\"url(#m4-rec)\" stroke=\"#7a2515\" stroke-width=\"1.4\"><\u002Fpath>\n            <\u002Fg>\n            <!-- floating neurotransmitter -->\n            <circle id=\"m4-nt-far\" cx=\"100\" cy=\"55\" r=\"9\" fill=\"#3d7a52\" stroke=\"#1f4a2d\" stroke-width=\"1\"><\u002Fcircle>\n            <!-- bound neurotransmitter -->\n            <circle id=\"m4-nt-bound\" cx=\"200\" cy=\"120\" r=\"9\" fill=\"#3d7a52\" stroke=\"#1f4a2d\" stroke-width=\"1\"><\u002Fcircle>\n\n            <!-- ===== G-protein detached (under receptor) ===== -->\n            <g id=\"m4-gp-rec\">\n              <polygon id=\"m4-burst\" points=\"220,230 232,250 256,246 240,266 256,286 232,282 220,302 208,282 184,286 200,266 184,246 208,250\" fill=\"url(#m4-burst)\" stroke=\"#e8a020\" stroke-width=\"0.8\" opacity=\"0\"><\u002Fpolygon>\n              <ellipse cx=\"220\" cy=\"266\" rx=\"22\" ry=\"14\" fill=\"url(#m4-gp)\" stroke=\"#1f4a6e\" stroke-width=\"1\"><\u002Fellipse>\n              <text x=\"212\" y=\"271\" font-size=\"10\" fill=\"#1c2620\" font-weight=\"700\" font-style=\"italic\">α<\u002Ftext>\n              <text x=\"230\" y=\"263\" font-size=\"9\" fill=\"#1c2620\" font-weight=\"700\" font-style=\"italic\">β<\u002Ftext>\n              <text x=\"240\" y=\"273\" font-size=\"9\" fill=\"#1c2620\" font-weight=\"700\" font-style=\"italic\">γ<\u002Ftext>\n            <\u002Fg>\n\n            <!-- traveling alpha subunit -->\n            <g id=\"m4-alpha-travel\" opacity=\"0\">\n              <ellipse cx=\"290\" cy=\"290\" rx=\"16\" ry=\"11\" fill=\"url(#m4-gp)\" stroke=\"#1f4a6e\" stroke-width=\"1\"><\u002Fellipse>\n              <text x=\"284\" y=\"294\" font-size=\"10\" fill=\"#1c2620\" font-weight=\"700\" font-style=\"italic\">α<\u002Ftext>\n            <\u002Fg>\n\n            <!-- ===== EFFECTOR (middle) ===== -->\n            <g id=\"m4-effector\">\n              <!-- two bumps shape -->\n              <path d=\"M 365 165 Q 365 145 380 145 Q 395 145 395 165 L 395 230 L 415 230 L 415 175 Q 415 155 430 155 Q 445 155 445 175 L 445 230 L 365 230 Z\" fill=\"url(#m4-eff)\" stroke=\"#5a3015\" stroke-width=\"1.2\"><\u002Fpath>\n            <\u002Fg>\n            <text x=\"360\" y=\"135\" font-size=\"11\" fill=\"#1c2620\" font-style=\"italic\" text-anchor=\"end\">Effector protein<\u002Ftext>\n            <line x1=\"362\" y1=\"138\" x2=\"395\" y2=\"155\" stroke=\"#3a4640\" stroke-width=\"0.8\"><\u002Fline>\n\n            <!-- arrow alpha -> effector -->\n            <path id=\"m4-arrow-eff\" d=\"M 250 280 Q 320 295 365 270\" stroke=\"#3a4640\" stroke-width=\"1.5\" fill=\"none\" marker-end=\"url(#m4-arrow-h)\" opacity=\"0\"><\u002Fpath>\n            <text x=\"335\" y=\"315\" font-size=\"11\" font-style=\"italic\" fill=\"#1c2620\" text-anchor=\"middle\" id=\"m4-msg-label\" opacity=\"0\">Intracellular<\u002Ftext>\n            <text x=\"335\" y=\"328\" font-size=\"11\" font-style=\"italic\" fill=\"#1c2620\" text-anchor=\"middle\" id=\"m4-msg-label2\" opacity=\"0\">messengers<\u002Ftext>\n\n            <!-- second messengers near effector -->\n            <g id=\"m4-messengers\">\n              <circle class=\"m4msg\" cx=\"455\" cy=\"290\" r=\"4.5\" fill=\"#d44a3a\" stroke=\"#7a2515\" stroke-width=\"0.6\" opacity=\"0\"><\u002Fcircle>\n              <circle class=\"m4msg\" cx=\"475\" cy=\"305\" r=\"4.5\" fill=\"#d44a3a\" stroke=\"#7a2515\" stroke-width=\"0.6\" opacity=\"0\"><\u002Fcircle>\n              <circle class=\"m4msg\" cx=\"495\" cy=\"290\" r=\"4.5\" fill=\"#
